<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HAROSAT - Clientes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--blue: #1a4d99;
--gold: #f0a500;
--white: #ffffff;
--gray: #f4f7fc;
--text: #1a2340;
--muted: #7a8aa8;
--danger: #e53e3e;
--success: #22863a;
--pale: #e8f0fe;
--mid: #c5d8f5;
--radius: 14px;
--shadow: 0 4px 24px rgba(26,77,153,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--gray); color: var(--text); min-height: 100vh; }
header {
background: var(--blue); padding: 18px 20px 14px;
display: flex; align-items: center; justify-content: space-between;
position: sticky; top: 0; z-index: 100;
box-shadow: 0 2px 12px rgba(26,77,153,0.25);
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--white); letter-spacing: 2px; line-height: 1; }
.logo span { color: var(--gold); }
.sub { font-size: 10px; color: rgba(255,255,255,0.55); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
.btn-add {
background: var(--gold); color: var(--blue); border: none; border-radius: 50%;
width: 40px; height: 40px; font-size: 26px; font-weight: 300;
cursor: pointer; display: flex; align-items: center; justify-content: center;
box-shadow: 0 2px 8px rgba(240,165,0,0.4);
}
.summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px 16px 0; }
.card { background: var(--white); border-radius: var(--radius); padding: 12px 10px; text-align: center; box-shadow: var(--shadow); border-top: 3px solid var(--mid); }
.card.verde { border-top-color: #22c55e; }
.card.rojo { border-top-color: var(--danger); }
.card.oro { border-top-color: var(--gold); }
.card-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 4px; }
.card-value { font-size: 15px; font-weight: 600; }
.search-wrap { padding: 14px 16px 8px; }
.search-wrap input {
width: 100%; border: 1.5px solid var(--mid); border-radius: 10px;
padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px;
background: var(--white); color: var(--text); outline: none;
}
.list { padding: 8px 16px 100px; }
.client-card {
background: var(--white); border-radius: var(--radius); margin-bottom: 12px;
box-shadow: var(--shadow); overflow: hidden; border-left: 4px solid var(--blue);
}
.client-card.cobrado { border-left-color: #22c55e; }
.client-card.pendiente { border-left-color: var(--danger); }
.client-header { display: flex; align-items: center; padding: 13px 14px 10px; cursor: pointer; gap: 12px; }
.avatar {
width: 38px; height: 38px; border-radius: 50%; background: var(--pale); color: var(--blue);
font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center;
flex-shrink: 0; font-family: 'Bebas Neue', sans-serif;
}
.client-info { flex: 1; min-width: 0; }
.client-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-addr { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
.badge.ok { background: #dcfce7; color: #166534; }
.badge.pend { background: #fee2e2; color: #991b1b; }
.badge.parcial { background: #fef9c3; color: #854d0e; }
.badge.term { background: #dcfce7; color: #166534; }
.badge.curso { background: var(--pale); color: var(--blue); }
.client-detail { display: none; padding: 0 14px 14px; border-top: 1px solid var(--pale); }
.client-detail.open { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
.detail-item label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 2px; }
.detail-item .val { font-size: 14px; font-weight: 600; }
.val.green { color: var(--success); }
.val.red { color: var(--danger); }
.val.gold { color: #b07000; }
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-edit, .btn-del { flex: 1; padding: 9px; border-radius: 9px; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-edit { background: var(--pale); color: var(--blue); }
.btn-del { background: #fee2e2; color: var(--danger); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,20,50,0.55); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--blue); letter-spacing: 2px; margin-bottom: 18px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
.form-group input { width: 100%; border: 1.5px solid var(--mid); border-radius: 10px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); background: var(--white); outline: none; -webkit-appearance: none; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.toggle-wrap { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 4px 0; }
.toggle-track { width: 52px; height: 28px; border-radius: 14px; background: var(--mid); position: relative; transition: background 0.25s; flex-shrink: 0; }
.toggle-track.on { background: #22c55e; }
.toggle-thumb { width: 22px; height: 22px; border-radius: 50%; background: white; position: absolute; top: 3px; left: 3px; transition: left 0.25s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
.toggle-track.on .toggle-thumb { left: 27px; }
.btn-save { width: 100%; background: var(--blue); color: var(--white); border: none; border-radius: 12px; padding: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; margin-top: 6px; }
.btn-cancel { width: 100%; background: transparent; color: var(--muted); border: none; padding: 12px; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 4px; }
.empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 14px; }
.empty-icon { font-size: 42px; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
<div>
<div class="logo">HARO<span>SAT</span></div>
<div class="sub">Gestion de Clientes</div>
</div>
<button class="btn-add" onclick="openModal()">+</button>
</header>

<div class="summary">
<div class="card">
<div class="card-label">Presupuestado</div>
<div class="card-value" id="sum-p">0 EUR</div>
</div>
<div class="card oro">
<div class="card-label">Facturado</div>
<div class="card-value" id="sum-f">0 EUR</div>
</div>
<div class="card verde">
<div class="card-label">Cobrado Total</div>
<div class="card-value" id="sum-c">0 EUR</div>
</div>
<div class="card rojo">
<div class="card-label">Pendiente</div>
<div class="card-value" id="sum-pend">0 EUR</div>
</div>
</div>

<div class="search-wrap">
<input type="search" id="search" placeholder="Buscar cliente..." oninput="render()">
</div>

<div class="list" id="list"></div>

<div class="modal-overlay" id="modal" onclick="closeIfOverlay(event)">
<div class="modal">
<div class="modal-title" id="modal-title">NUEVO CLIENTE</div>
<div class="form-group">
<label>Nombre</label>
<input type="text" id="f-nombre" placeholder="Nombre completo">
</div>
<div class="form-group">
<label>Direccion</label>
<input type="text" id="f-dir" placeholder="Calle, numero, localidad">
</div>
<div class="form-row">
<div class="form-group">
<label>Presupuesto (EUR)</label>
<input type="number" id="f-pre" placeholder="0.00" step="0.01" min="0">
</div>
<div class="form-group">
<label>Aceptado (EUR)</label>
<input type="number" id="f-ace" placeholder="0.00" step="0.01" min="0" oninput="calcPend()">
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>Parte Cobrada (EUR)</label>
<input type="number" id="f-cob" placeholder="0.00" step="0.01" min="0" oninput="calcPend()">
</div>
<div class="form-group">
<label>Parte Pendiente (EUR)</label>
<input type="number" id="f-pen" placeholder="0.00" step="0.01" min="0" readonly style="background:#f8faff;color:#7a8aa8">
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>Cobrado Total (EUR)</label>
<input type="number" id="f-ctot" placeholder="0.00" step="0.01" min="0">
</div>
<div class="form-group">
<label>Facturado (EUR)</label>
<input type="number" id="f-fact" placeholder="0.00" step="0.01" min="0">
</div>
</div>
<div class="form-group">
<label>Trabajo Terminado</label>
<div class="toggle-wrap" onclick="toggleWork()">
<div class="toggle-track" id="tt"><div class="toggle-thumb"></div></div>
<span id="tl" style="font-size:14px;font-weight:600;color:#7a8aa8">NO</span>
</div>
</div>
<button class="btn-save" onclick="saveClient()">GUARDAR</button>
<button class="btn-cancel" onclick="closeModal()">Cancelar</button>
</div>
</div>

<script>
var KEY = 'harosat_v2';
var clients = [];
var editId = null;

function load() { try { clients = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { clients = []; } }
function save() { localStorage.setItem(KEY, JSON.stringify(clients)); }
function fmt(n) { return (parseFloat(n)||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' EUR'; }
function ini(n) { return n.trim().split(/\s+/).slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase()||'?'; }

function calcPend() {
var a = parseFloat(document.getElementById('f-ace').value)||0;
var c = parseFloat(document.getElementById('f-cob').value)||0;
document.getElementById('f-pen').value = Math.max(0,a-c).toFixed(2);
}

function status(c) {
var p = parseFloat(c.pen)||0;
var a = parseFloat(c.ace)||0;
if (a>0 && p<=0) return ['ok','COBRADO'];
if (p>0 && (parseFloat(c.cob)||0)>0) return ['parcial','PARCIAL'];
if (p>0) return ['pend','PENDIENTE'];
return ['ok','OK'];
}

function render() {
var q = document.getElementById('search').value.toLowerCase();
var f = clients.filter(function(c){ return c.nombre.toLowerCase().indexOf(q)>=0 || (c.dir||'').toLowerCase().indexOf(q)>=0; });
document.getElementById('sum-p').textContent = fmt(clients.reduce(function(s,c){return s+(parseFloat(c.pre)||0);},0));
document.getElementById('sum-f').textContent = fmt(clients.reduce(function(s,c){return s+(parseFloat(c.fact)||0);},0));
document.getElementById('sum-c').textContent = fmt(clients.reduce(function(s,c){return s+(parseFloat(c.ctot)||0);},0));
document.getElementById('sum-pend').textContent = fmt(clients.reduce(function(s,c){return s+(parseFloat(c.pen)||0);},0));
var list = document.getElementById('list');
if (!f.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">👷</div>No hay clientes'+(q?' con ese nombre':' aun')+'.<br>Pulsa + para añadir uno.</div>'; return; }
list.innerHTML = f.map(function(c) {
var s = status(c);
var cc = s[0]==='ok'?'cobrado':s[0]==='pend'?'pendiente':'';
return '<div class="client-card '+cc+'" id="card-'+c.id+'">'+
'<div class="client-header" onclick="toggle(\''+c.id+'\')">'+
'<div class="avatar">'+ini(c.nombre)+'</div>'+
'<div class="client-info"><div class="client-name">'+c.nombre+'</div><div class="client-addr">'+(c.dir||'—')+'</div></div>'+
'<div class="badges">'+
'<span class="badge '+s[0]+'">'+s[1]+'</span>'+
'<span class="badge '+(c.term?'term':'curso')+'">'+(c.term?'✅':'🔧')+'</span>'+
'</div></div>'+
'<div class="client-detail" id="det-'+c.id+'">'+
'<div class="detail-grid">'+
'<div class="detail-item"><label>Presupuesto</label><div class="val">'+fmt(c.pre)+'</div></div>'+
'<div class="detail-item"><label>Aceptado</label><div class="val">'+fmt(c.ace)+'</div></div>'+
'<div class="detail-item"><label>Parte Cobrada</label><div class="val green">'+fmt(c.cob)+'</div></div>'+
'<div class="detail-item"><label>Parte Pendiente</label><div class="val red">'+fmt(c.pen)+'</div></div>'+
'<div class="detail-item"><label>Cobrado Total</label><div class="val green">'+fmt(c.ctot)+'</div></div>'+
'<div class="detail-item"><label>Facturado</label><div class="val gold">'+fmt(c.fact)+'</div></div>'+
'<div class="detail-item" style="grid-column:1/-1"><label>Trabajo Terminado</label><div class="val" style="color:'+(c.term?'#166534':'#1a4d99')+'">'+(c.term?'✅ SI':'🔧 EN CURSO')+'</div></div>'+
'</div>'+
'<div class="btn-row">'+
'<button class="btn-edit" onclick="editClient(\''+c.id+'\')">✏️ Editar</button>'+
'<button class="btn-del" onclick="delClient(\''+c.id+'\')">🗑 Eliminar</button>'+
'</div></div></div>';
}).join('');
}

function toggle(id) { document.getElementById('det-'+id).classList.toggle('open'); }

function openModal(reset) {
if (reset !== false) {
editId = null;
document.getElementById('modal-title').textContent = 'NUEVO CLIENTE';
['f-nombre','f-dir','f-pre','f-ace','f-cob','f-pen','f-ctot','f-fact'].forEach(function(id){ document.getElementById(id).value=''; });
setTog(false);
}
document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeIfOverlay(e) { if (e.target.id==='modal') closeModal(); }

function saveClient() {
var nombre = document.getElementById('f-nombre').value.trim();
if (!nombre) { alert('Introduce el nombre del cliente.'); return; }
var d = {
nombre: nombre,
dir: document.getElementById('f-dir').value.trim(),
pre: parseFloat(document.getElementById('f-pre').value)||0,
ace: parseFloat(document.getElementById('f-ace').value)||0,
cob: parseFloat(document.getElementById('f-cob').value)||0,
pen: parseFloat(document.getElementById('f-pen').value)||0,
ctot: parseFloat(document.getElementById('f-ctot').value)||0,
fact: parseFloat(document.getElementById('f-fact').value)||0,
term: document.getElementById('tt').classList.contains('on')
};
if (editId) {
var i = clients.findIndex(function(c){return c.id===editId;});
if (i>-1) clients[i] = Object.assign(clients[i],d);
} else {
d.id = 'c'+Date.now();
clients.unshift(d);
}
save(); closeModal(); render();
}

function editClient(id) {
var c = clients.find(function(x){return x.id===id;});
if (!c) return;
editId = id;
document.getElementById('modal-title').textContent = 'EDITAR CLIENTE';
document.getElementById('f-nombre').value = c.nombre;
document.getElementById('f-dir').value = c.dir||'';
document.getElementById('f-pre').value = c.pre||'';
document.getElementById('f-ace').value = c.ace||'';
document.getElementById('f-cob').value = c.cob||'';
document.getElementById('f-pen').value = c.pen||'';
document.getElementById('f-ctot').value = c.ctot||'';
document.getElementById('f-fact').value = c.fact||'';
setTog(!!c.term);
openModal(false);
}

function delClient(id) {
if (!confirm('Eliminar este cliente?')) return;
clients = clients.filter(function(c){return c.id!==id;});
save(); render();
}

function setTog(v) {
var t = document.getElementById('tt');
var l = document.getElementById('tl');
if (v) { t.classList.add('on'); l.textContent='SI'; l.style.color='#166534'; }
else { t.classList.remove('on'); l.textContent='NO'; l.style.color='#7a8aa8'; }
}
function toggleWork() { setTog(!document.getElementById('tt').classList.contains('on')); }

load(); render();
</script>

</body>
</html>
