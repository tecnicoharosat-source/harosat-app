    <nav class="mb-6 flex gap-2 flex-wrap">
        <button onclick="showSection('dashboard')" class="bg-blue-600 px-4 py-2 rounded">📊 Dashboard</button>
        <button onclick="showSection('ingresos')" class="bg-green-600 px-4 py-2 rounded">💰 Ingresos</button>
        <button onclick="showSection('gastos')" class="bg-red-600 px-4 py-2 rounded">💸 Gastos</button>
        <button onclick="document.getElementById('importFile').click()" class="bg-purple-600 px-4 py-2 rounded">📥 Importar</button>
    </nav>
    <input type="file" id="importFile" accept=".csv,.xlsx" style="display:none" onchange="importData(event)">

    <!-- DASHBOARD -->
    <div id="dashboard" class="section">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-green-900 p-6 rounded-lg">
                <h3 class="text-lg font-bold mb-2">INGRESOS</h3>
                <p id="totalIngresos" class="text-4xl font-bold">0,00 €</p>
            </div>
            <div class="bg-red-900 p-6 rounded-lg">
                <h3 class="text-lg font-bold mb-2">GASTOS</h3>
                <p id="totalGastos" class="text-4xl font-bold">0,00 €</p>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg mb-6">
            <h3 class="text-xl font-bold mb-4">Últimas Operaciones</h3>
            <div id="ultimasOperaciones" class="space-y-2"></div>
        </div>
    </div>

    <!-- INGRESOS -->
    <div id="ingresos" class="section hidden">
        <div class="bg-gray-800 p-6 rounded-lg mb-6">
            <h2 class="text-2xl font-bold mb-4">Registrar Ingreso</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <input type="date" id="fechaIngreso" class="bg-gray-700 p-2 rounded">
                <input type="text" id="conceptoIngreso" placeholder="Concepto" class="bg-gray-700 p-2 rounded">
                <input type="number" id="importeIngreso" placeholder="Importe" step="0.01" class="bg-gray-700 p-2 rounded">
            </div>
            <button onclick="addIngreso()" class="bg-green-600 px-6 py-2 rounded">+ Añadir Ingreso</button>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg">
            <h3 class="text-xl font-bold mb-4">Listado de Ingresos</h3>
            <div id="listaIngresos" class="space-y-2"></div>
        </div>
    </div>

    <!-- GASTOS -->
    <div id="gastos" class="section hidden">
        <div class="bg-gray-800 p-6 rounded-lg mb-6">
            <h2 class="text-2xl font-bold mb-4">Registrar Gasto</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <input type="date" id="fechaGasto" class="bg-gray-700 p-2 rounded">
                <input type="text" id="conceptoGasto" placeholder="Concepto" class="bg-gray-700 p-2 rounded">
                <input type="number" id="importeGasto" placeholder="Importe" step="0.01" class="bg-gray-700 p-2 rounded">
            </div>
            <button onclick="addGasto()" class="bg-red-600 px-6 py-2 rounded">+ Añadir Gasto</button>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg">
            <h3 class="text-xl font-bold mb-4">Listado de Gastos</h3>

        </div>

</div>

<script>
    // Configuración Supabase
    const SUPABASE_URL = 'https://sobiyfyzalynxcpfoldc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvYml5Znl6YWx5bnhjcGZvbGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTA0MjksImV4cCI6MjA4ODU4NjQyOX0.FJOYHGjk-UI-SfEpZ2ytOvUJuTb4kGL9aBqj2ChXgek';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Navegación
    function showSection(section) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        document.getElementById(section).classList.remove('hidden');
        if (section === 'dashboard') loadDashboard();
        if (section === 'ingresos') loadIngresos();
        if (section === 'gastos') loadGastos();
    }

    // Dashboard
    async function loadDashboard() {
        try {
            const { data: ingresos } = await supabase.from('conta_ingresos').select('*');
            const { data: gastos } = await supabase.from('conta_gastos').select('*');

            const totalIngresos = (ingresos || []).reduce((sum, i) => sum + parseFloat(i.importe || 0), 0);
            const totalGastos = (gastos || []).reduce((sum, g) => sum + parseFloat(g.importe || 0), 0);

            document.getElementById('totalIngresos').textContent = totalIngresos.toFixed(2) + ' €';
            document.getElementById('totalGastos').textContent = totalGastos.toFixed(2) + ' €';

            const todas = [
                ...(ingresos || []).map(i => ({...i, tipo: 'ingreso'})),
                ...(gastos || []).map(g => ({...g, tipo: 'gasto'}))
            ].sort((a, b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 10);

            const html = todas.map(op => `
                <div class="p-3 rounded ${op.tipo === 'ingreso' ? 'bg-green-800' : 'bg-red-800'}">
                    <div class="flex justify-between">
                        <span>${op.fecha} - ${op.concepto}</span>
                        <span class="font-bold">${parseFloat(op.importe).toFixed(2)} €</span>
                    </div>
                </div>
            `).join('');

            document.getElementById('ultimasOperaciones').innerHTML = html || '<p class="text-gray-400">No hay operaciones</p>';
        } catch (error) {
            console.error('Error:', error);
            alert('Error cargando datos: ' + error.message);
        }
    }

    // Ingresos
    async function loadIngresos() {
        try {
            const { data } = await supabase.from('conta_ingresos').select('*').order('fecha', { ascending: false });
            
            const html = (data || []).map(i => `
                <div class="bg-green-800 p-3 rounded flex justify-between">
                    <span>${i.fecha} - ${i.concepto}</span>
                    <span class="font-bold">${parseFloat(i.importe).toFixed(2)} €</span>
                </div>
            `).join('');

            document.getElementById('listaIngresos').innerHTML = html || '<p class="text-gray-400">No hay ingresos</p>';
        } catch (error) {
            console.error('Error:', error);
        }
    }

    async function addIngreso() {
        const fecha = document.getElementById('fechaIngreso').value;
        const concepto = document.getElementById('conceptoIngreso').value;
        const importe = parseFloat(document.getElementById('importeIngreso').value);

        if (!fecha || !concepto || !importe) {
            alert('Completa todos los campos');
            return;
        }

        try {
            const { error } = await supabase.from('conta_ingresos').insert([{
                fecha,
                concepto,
                importe,
                iva: importe * 0.21,
                irpf: importe * 0.15
            }]);

            if (error) throw error;

            document.getElementById('fechaIngreso').value = '';
            document.getElementById('conceptoIngreso').value = '';
            document.getElementById('importeIngreso').value = '';
            
            loadIngresos();
            alert('Ingreso añadido');
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }

    // Gastos
    async function loadGastos() {
        try {
            const { data } = await supabase.from('conta_gastos').select('*').order('fecha', { ascending: false });
            
            const html = (data || []).map(g => `
                <div class="bg-red-800 p-3 rounded flex justify-between">
                    <span>${g.fecha} - ${g.concepto}</span>
                    <span class="font-bold">${parseFloat(g.importe).toFixed(2)} €</span>
                </div>
            `).join('');

            document.getElementById('listaGastos').innerHTML = html || '<p class="text-gray-400">No hay gastos</p>';
        } catch (error) {
            console.error('Error:', error);
        }
    }

    async function addGasto() {
        const fecha = document.getElementById('fechaGasto').value;
        const concepto = document.getElementById('conceptoGasto').value;
        const importe = parseFloat(document.getElementById('importeGasto').value);

        if (!fecha || !concepto || !importe) {
            alert('Completa todos los campos');
            return;
        }

        try {
            const { error } = await supabase.from('conta_gastos').insert([{
                fecha,
                concepto,
                importe,
                iva: importe * 0.21
            }]);

            if (error) throw error;

            document.getElementById('fechaGasto').value = '';
            document.getElementById('conceptoGasto').value = '';
            document.getElementById('importeGasto').value = '';
            
            loadGastos();
            alert('Gasto añadido');
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }

    // Importar datos desde CSV
    async function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const text = e.target.result;
                const lines = text.split('\n').filter(l => l.trim());
                
                if (lines.length < 2) {
                    alert('Archivo vacío');
                    return;
                }

                const tipo = confirm('¿Son INGRESOS?\n\nOK = Ingresos\nCancelar = Gastos');
                const tabla = tipo ? 'conta_ingresos' : 'conta_gastos';
                
                let importados = 0;
                
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',');
                    if (cols.length < 3) continue;
                    
                    const fecha = cols[0].trim();
                    const concepto = cols[1].trim();
                    const importe = parseFloat(cols[2].trim().replace(',', '.'));
                    
                    if (!fecha || !concepto || isNaN(importe)) continue;
                    
                    const registro = {
                        fecha,
                        concepto,
                        importe,
                        iva: importe * 0.21
                    };
                    
                    if (tipo) {
                        registro.irpf = importe * 0.15;
                    }
                    
                    const { error } = await supabase.from(tabla).insert([registro]);
                    if (!error) importados++;
                }
                
                alert(`Importados ${importados} registros`);
                loadDashboard();
            } catch (error) {
                alert('Error importando: ' + error.message);
            }
        };
        reader.readAsText(file);
    }

    // Cargar dashboard al inicio
    document.getElementById('fechaIngreso').value = new Date().toISOString().split('T')[0];
    document.getElementById('fechaGasto').value = new Date().toISOString().split('T')[0];
    loadDashboard();
</script>
