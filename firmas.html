<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAROSAT · Gestión de Firmas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060910; --s1: #0d1117; --s2: #161b22; --s3: #21262d;
  --border: #30363d; --blue: #1f6feb; --blue2: #388bfd;
  --green: #3fb950; --red: #f85149; --orange: #d29922;
  --gold: #e3b341; --purple: #a371f7; --text: #e6edf3;
  --muted: #7d8590; --light: #b1bac4; --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* TOPBAR */
.topbar { height: 52px; background: var(–s1); border-bottom: 1px solid var(–border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
.logo { font-weight: 800; font-size: 16px; letter-spacing: .08em; }
.logo span { color: var(–blue2); }
.logo small { font-weight: 300; color: var(–muted); font-size: 13px; margin-left: 6px; }
.sync { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(–muted); background: var(–s2); border: 1px solid var(–border); padding: 5px 12px; border-radius: 20px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(–green); }
.dot.syncing { background: var(–orange); animation: pulse 1s infinite; }
.dot.error { background: var(–red); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

/* CONTENT */
.content { padding: 24px; max-width: 1100px; margin: 0 auto; }

/* KPI */
.kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
.kpi { background: var(–s1); border: 1px solid var(–border); border-radius: var(–r); padding: 16px 18px; position: relative; overflow: hidden; }
.kpi-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.kpi-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(–muted); margin-bottom: 6px; }
.kpi-val { font-size: 24px; font-weight: 800; font-family: ‘JetBrains Mono’, monospace; color: white; }

/* FILTROS */
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.fbtn { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(–border); background: var(–s2); color: var(–muted); transition: all .12s; white-space: nowrap; }
.fbtn.active { background: var(–blue); color: white; border-color: var(–blue); }
.fbtn:hover:not(.active) { color: var(–text); border-color: var(–blue2); }
.search { flex: 1; min-width: 200px; background: var(–s2); border: 1px solid var(–border); color: var(–text); padding: 8px 14px; border-radius: 8px; font-family: ‘Outfit’, sans-serif; font-size: 13px; }
.search:focus { outline: none; border-color: var(–blue); }
.search::placeholder { color: var(–muted); }

/* TABLA */
.card { background: var(–s1); border: 1px solid var(–border); border-radius: var(–r); overflow: hidden; }
.card-hdr { padding: 14px 18px; border-bottom: 1px solid var(–border); display: flex; justify-content: space-between; align-items: center; }
.card-title { font-size: 13px; font-weight: 700; color: white; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 10px 14px; font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(–muted); border-bottom: 1px solid var(–border); white-space: nowrap; }
td { padding: 11px 14px; border-bottom: 1px solid rgba(48,54,61,.5); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }
.mono { font-family: ‘JetBrains Mono’, monospace; }
.num { text-align: right; font-family: ‘JetBrains Mono’, monospace; }
.empty { text-align: center; padding: 48px 20px; color: var(–muted); }

/* BADGES */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
.b-pendiente  { background: rgba(48,54,61,.6);    color: var(–muted); }
.b-enviado    { background: rgba(56,139,253,.15); color: #79c0ff; }
.b-firmado    { background: rgba(163,113,247,.15);color: var(–purple); }
.b-aceptado   { background: rgba(63,185,80,.15);  color: var(–green); }
.b-rechazado  { background: rgba(248,81,73,.15);  color: #ff7b72; }

/* BOTONES ACCIÓN */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: 7px; font-family: ‘Outfit’, sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all .12s; white-space: nowrap; }
.btn-blue  { background: var(–blue); color: white; }
.btn-blue:hover { background: var(–blue2); }
.btn-ghost { background: var(–s2); color: var(–light); border: 1px solid var(–border); }
.btn-ghost:hover { background: var(–s3); color: white; }
.btn-green { background: var(–green); color: #000; }
.btn-green:hover { opacity: .85; }
.btn-red   { background: transparent; color: var(–red); border: 1px solid var(–red); }
.btn-red:hover { background: var(–red); color: white; }
.btn-wa    { background: #25D366; color: #000; }
.btn-wa:hover { background: #1ebe5d; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.action-btn { background: none; border: none; cursor: pointer; padding: 4px 7px; border-radius: 5px; font-size: 13px; color: var(–muted); transition: all .1s; }
.action-btn:hover { color: var(–blue2); background: rgba(56,139,253,.1); }

/* MODAL ENVÍO */
.overlay { visibility: hidden; opacity: 0; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 16px; transition: opacity .2s; }
.overlay.open { visibility: visible; opacity: 1; }
.modal { background: var(–s1); border: 1px solid var(–border); border-radius: 14px; padding: 24px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; }
.modal-title { font-size: 17px; font-weight: 800; color: white; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(–muted); margin-bottom: 20px; }
.link-box { background: var(–s2); border: 1px solid var(–border); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; }
.link-lbl { font-size: 10px; font-weight: 700; color: var(–muted); text-transform: uppercase; margin-bottom: 5px; }
.link-url { font-size: 11px; color: #79c0ff; word-break: break-all; font-family: ‘JetBrains Mono’, monospace; }
.send-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.send-btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-family: ‘Outfit’, sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px; transition: all .12s; }
.send-btn:active { transform: scale(.98); }
.send-wa    { background: #25D366; color: #000; }
.send-wa:hover { background: #1ebe5d; }
.send-gmail { background: white; color: #374151; }
.send-gmail:hover { background: #f3f4f6; }
.send-copy  { background: var(–s3); color: var(–text); border: 1px solid var(–border); }
.send-copy:hover { background: var(–s2); }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

/* PANEL FIRMA */
.side-bg { visibility: hidden; opacity: 0; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 300; transition: opacity .2s; }
.side-bg.open { visibility: visible; opacity: 1; }
.side-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(460px, 100%); background: var(–s1); border-left: 1px solid var(–border); overflow-y: auto; z-index: 301; transform: translateX(100%); transition: transform .25s ease; }
.side-panel.open { transform: translateX(0); }
.side-hd { padding: 16px 20px; border-bottom: 1px solid var(–border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(–s1); z-index: 5; }
.side-num { font-size: 17px; font-weight: 800; color: var(–blue2); }
.side-close { background: none; border: none; color: var(–muted); font-size: 18px; cursor: pointer; padding: 2px 6px; }
.side-close:hover { color: var(–text); }
.side-bd { padding: 20px; }
.s-sec { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(–muted); margin: .8rem 0 .4rem; }
.s-sec:first-child { margin-top: 0; }
.s-blk { background: var(–s2); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.s-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 3px 0; font-size: 12px; }
.s-lbl { color: var(–muted); flex-shrink: 0; margin-right: 8px; }
.s-val { color: var(–text); font-weight: 500; text-align: right; }
.s-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; padding-bottom: 24px; }
.firma-img { width: 100%; border: 1px solid var(–border); border-radius: 8px; background: #f8fafc; margin-top: 4px; }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: var(–s2); border: 1px solid var(–border); border-radius: 10px; padding: 12px 18px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; transform: translateY(80px); opacity: 0; transition: all .3s; max-width: 320px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok  { border-color: rgba(63,185,80,.4);  color: var(–green); }
.toast.err { border-color: rgba(248,81,73,.4);  color: var(–red); }
.toast.info{ border-color: rgba(56,139,253,.4); color: var(–blue2); }

/* RESPONSIVE */
@media(max-width:800px) { .kpis { grid-template-columns: repeat(3,1fr); } }
@media(max-width:540px) { .kpis { grid-template-columns: repeat(2,1fr); } .content { padding: 14px; } }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }
</style>

</head>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var SUPA_URL = 'https://sobiyfyzalynxcpfoldc.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvYml5Znl6YWx5bnhjcGZvbGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTA0MjksImV4cCI6MjA4ODU4NjQyOX0.FJOYHGjk-UI-SfEpZ2ytOvUJuTb4kGL9aBqj2ChXgek';
var FIRMA_BASE = 'https://tecnicoharosat-source.github.io/harosat-app/firmar.html';
var H = { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', Prefer: 'return=representation' };

function sbGet(qs) { return fetch(SUPA_URL + '/rest/v1/presupuestos?' + qs, { headers: H }).then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.json(); }); }
function sbPatch(id, row) { return fetch(SUPA_URL + '/rest/v1/presupuestos?id=eq.' + id, { method: 'PATCH', headers: H, body: JSON.stringify(row) }).then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); }); }

// ── ESTADO ────────────────────────────────────────────────────────────────────
var PRES = [];
var filtroActivo = 'todos';
var presActivo = null;

// ── SYNC ──────────────────────────────────────────────────────────────────────
function setSync(s, msg) {
  var d = document.getElementById('sync-dot');
  d.className = 'dot' + (s === 'syncing' ? ' syncing' : s === 'error' ? ' error' : '');
  document.getElementById('sync-txt').textContent = msg;
}

// ── CARGA ─────────────────────────────────────────────────────────────────────
function cargar() {
  setSync('syncing', 'Cargando...');
  sbGet('select=id,numero,cliente,telefono,descripcion,total,fecha_emision,estado_firma,firma_img,fecha_envio,fecha_firma&order=fecha_emision.desc&limit=200')
    .then(function(d) {
      PRES = d || [];
      setSync('ok', 'Sincronizado');
      render();
    })
    .catch(function(e) {
      setSync('error', 'Error de conexión');
      document.getElementById('tabla').innerHTML = '<div class="empty">⚠️ ' + e.message + '</div>';
    });
}

// ── FILTRO ────────────────────────────────────────────────────────────────────
function setFiltro(f) {
  filtroActivo = f;
  document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('f-' + f).classList.add('active');
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  var sr = (document.getElementById('buscar').value || '').toLowerCase();
  var fil = PRES.filter(function(p) {
    if (filtroActivo !== 'todos' && p.estado_firma !== filtroActivo) return false;
    if (sr && ((p.numero||'') + ' ' + (p.cliente||'')).toLowerCase().indexOf(sr) === -1) return false;
    return true;
  });

  // KPIs
  var cnt = { pendiente:0, enviado:0, firmado:0, aceptado:0, rechazado:0 };
  PRES.forEach(function(p){ if(cnt[p.estado_firma] !== undefined) cnt[p.estado_firma]++; });
  document.getElementById('k-total').textContent     = PRES.length;
  document.getElementById('k-pendiente').textContent = cnt.pendiente;
  document.getElementById('k-enviado').textContent   = cnt.enviado;
  document.getElementById('k-firmado').textContent   = cnt.firmado;
  document.getElementById('k-aceptado').textContent  = cnt.aceptado;
  document.getElementById('card-tit').textContent    = fil.length + ' presupuesto' + (fil.length !== 1 ? 's' : '');

  var el = document.getElementById('tabla');
  if (!fil.length) { el.innerHTML = '<div class="empty">Sin resultados</div>'; return; }

  var html = '<div class="table-wrap"><table><thead><tr>' +
    '<th>Número</th><th>Cliente</th><th>Descripción</th><th>Fecha</th>' +
    '<th class="num">Total</th><th>Estado firma</th><th>Acción</th>' +
    '</tr></thead><tbody>';

  fil.forEach(function(p) {
    var ef = p.estado_firma || 'pendiente';
    var accion = '';
    if (ef === 'pendiente' || ef === 'enviado') {
      accion = '<button class="btn btn-blue btn-sm" onclick="event.stopPropagation();abrirEnvio(' + p.id + ')">📤 Enviar</button>';
    } else if (ef === 'firmado') {
      accion =
        '<button class="btn btn-green btn-sm" onclick="event.stopPropagation();cambiarEstado(' + p.id + ',\'aceptado\')" style="margin-right:4px">✅ Aceptar</button>' +
        '<button class="btn btn-red btn-sm"   onclick="event.stopPropagation();cambiarEstado(' + p.id + ',\'rechazado\')">❌ Rechazar</button>';
    } else if (ef === 'aceptado') {
      accion = '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();abrirEnvio(' + p.id + ')">↺ Reenviar</button>';
    }

    html += '<tr onclick="abrirDetalle(' + p.id + ')" style="cursor:pointer">' +
      '<td class="mono" style="color:var(--blue2);font-weight:700">' + esc(p.numero||'') + '</td>' +
      '<td style="font-weight:600;color:white">' + esc(p.cliente||'') + '</td>' +
      '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">' + esc(p.descripcion||'') + '</td>' +
      '<td style="color:var(--muted)">' + fd(p.fecha_emision) + '</td>' +
      '<td class="num" style="font-weight:700;color:white">' + fn(p.total||0) + ' €</td>' +
      '<td>' + badgeFirma(ef) + '</td>' +
      '<td onclick="event.stopPropagation()">' + accion + '</td>' +
      '</tr>';
  });

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

// ── BADGE ─────────────────────────────────────────────────────────────────────
function badgeFirma(e) {
  var map = { pendiente:'⏳ Pendiente', enviado:'📤 Enviado', firmado:'✍️ Firmado', aceptado:'✅ Aceptado', rechazado:'❌ Rechazado' };
  return '<span class="badge b-' + e + '">' + (map[e] || e) + '</span>';
}

// ── MODAL ENVÍO ───────────────────────────────────────────────────────────────
function abrirEnvio(id) {
  var p = PRES.filter(function(x){ return x.id === id; })[0];
  if (!p) return;
  presActivo = p;

  var enlace = FIRMA_BASE + '?id=' + p.id;
  document.getElementById('me-sub').textContent = p.numero + ' · ' + p.cliente + ' · ' + fn(p.total||0) + ' €';
  document.getElementById('me-link').textContent = enlace;

  // WhatsApp
  var tel = (p.telefono || '').replace(/\s/g, '');
  var txtWA = encodeURIComponent(
    '✍️ *Presupuesto ' + p.numero + ' — HAROSAT Ecotechnical*\n\n' +
    'Estimado/a ' + p.cliente + ',\n\n' +
    'Le enviamos el enlace para revisar y *firmar su presupuesto* por importe de *' + fn(p.total||0) + ' €*\n\n' +
    '👉 ' + enlace + '\n\n' +
    '_Pulse el enlace, revise el presupuesto y fírmelo desde su móvil o PC._\n\n' +
    'HAROSAT Ecotechnical · 640 05 64 84'
  );
  document.getElementById('me-wa').onclick = function() {
    var url = tel ? 'https://wa.me/34' + tel + '?text=' + txtWA : 'https://wa.me/?text=' + txtWA;
    window.open(url, '_blank');
    marcarEnviado(id);
    cerrarModalEnvio();
  };

  // Gmail
  var asunto = encodeURIComponent('Presupuesto ' + p.numero + ' para firmar — HAROSAT');
  var cuerpo = encodeURIComponent(
    'Estimado/a ' + p.cliente + ',\n\n' +
    'Le enviamos el enlace para revisar y firmar su presupuesto ' + p.numero + ' por importe de ' + fn(p.total||0) + ' €.\n\n' +
    'Pulse el siguiente enlace para firmarlo desde su móvil o PC:\n' + enlace + '\n\n' +
    'Gracias por confiar en HAROSAT Ecotechnical.\n\n' +
    'Un saludo,\nHAROSAT Ecotechnical\nTel.: 640 05 64 84 · 616 68 49 79\nharosatecnicos@gmail.com'
  );
  document.getElementById('me-gmail').onclick = function() {
    window.open('https://mail.google.com/mail/?view=cm&su=' + asunto + '&body=' + cuerpo, '_blank');
    marcarEnviado(id);
    cerrarModalEnvio();
  };

  // Copiar
  document.getElementById('me-copy').onclick = function() {
    navigator.clipboard.writeText(enlace).then(function(){ toast('Enlace copiado ✓', 'ok'); }).catch(function(){ toast('No se pudo copiar', 'err'); });
  };

  document.getElementById('modal-envio').classList.add('open');
}

function cerrarModalEnvio() {
  document.getElementById('modal-envio').classList.remove('open');
}
document.getElementById('modal-envio').addEventListener('click', function(e){ if (e.target === this) cerrarModalEnvio(); });

function marcarEnviado(id) {
  var p = PRES.filter(function(x){ return x.id === id; })[0];
  if (!p || p.estado_firma === 'firmado' || p.estado_firma === 'aceptado') return;
  sbPatch(id, { estado_firma: 'enviado', fecha_envio: new Date().toISOString() })
    .then(function() {
      var idx = PRES.findIndex(function(x){ return x.id === id; });
      if (idx >= 0) { PRES[idx].estado_firma = 'enviado'; PRES[idx].fecha_envio = new Date().toISOString(); }
      render();
      toast('Marcado como enviado ✓', 'ok');
    })
    .catch(function(e){ toast('Error: ' + e.message, 'err'); });
}

// ── CAMBIAR ESTADO ────────────────────────────────────────────────────────────
function cambiarEstado(id, estado) {
  var row = { estado_firma: estado };
  if (estado === 'aceptado' || estado === 'rechazado') row.fecha_firma = new Date().toISOString();
  sbPatch(id, row)
    .then(function() {
      var idx = PRES.findIndex(function(x){ return x.id === id; });
      if (idx >= 0) Object.assign(PRES[idx], row);
      render();
      closeSide();
      toast('Estado actualizado ✓', 'ok');
    })
    .catch(function(e){ toast('Error: ' + e.message, 'err'); });
}

// ── DETALLE LATERAL ───────────────────────────────────────────────────────────
function abrirDetalle(id) {
  var p = PRES.filter(function(x){ return x.id === id; })[0];
  if (!p) return;
  var ef = p.estado_firma || 'pendiente';
  document.getElementById('side-num').textContent = p.numero;

  var html =
    '<div class="s-sec">Presupuesto</div><div class="s-blk">' +
    '<div class="s-row"><span class="s-lbl">Número</span><span class="s-val mono" style="color:var(--blue2)">' + esc(p.numero||'') + '</span></div>' +
    '<div class="s-row"><span class="s-lbl">Fecha</span><span class="s-val">' + fd(p.fecha_emision) + '</span></div>' +
    '<div class="s-row"><span class="s-lbl">Total</span><span class="s-val" style="font-size:16px;font-weight:800;color:var(--blue2)">' + fn(p.total||0) + ' €</span></div>' +
    '</div>' +

    '<div class="s-sec">Cliente</div><div class="s-blk">' +
    '<div class="s-row"><span class="s-lbl">Nombre</span><span class="s-val">' + esc(p.cliente||'') + '</span></div>' +
    (p.telefono ? '<div class="s-row"><span class="s-lbl">Teléfono</span><span class="s-val">' + esc(p.telefono) + '</span></div>' : '') +
    '</div>' +

    '<div class="s-sec">Estado de firma</div><div class="s-blk">' +
    '<div class="s-row"><span class="s-lbl">Estado</span><span class="s-val">' + badgeFirma(ef) + '</span></div>' +
    (p.fecha_envio ? '<div class="s-row"><span class="s-lbl">Enviado</span><span class="s-val">' + fdt(p.fecha_envio) + '</span></div>' : '') +
    (p.fecha_firma ? '<div class="s-row"><span class="s-lbl">Firmado</span><span class="s-val">' + fdt(p.fecha_firma) + '</span></div>' : '') +
    '</div>';

  if (p.firma_img) {
    html += '<div class="s-sec">Firma del cliente</div>' +
      '<img src="' + p.firma_img + '" class="firma-img" alt="Firma">';
  }

  html += '<div class="s-actions">';
  if (ef === 'pendiente' || ef === 'enviado') {
    html += '<button class="btn btn-blue" style="width:100%" onclick="abrirEnvio(' + p.id + ');closeSide()">📤 Enviar enlace de firma</button>';
  }
  if (ef === 'firmado') {
    html +=
      '<button class="btn btn-green" style="width:100%" onclick="cambiarEstado(' + p.id + ',\'aceptado\')">✅ Marcar como Aceptado</button>' +
      '<button class="btn btn-red"   style="width:100%" onclick="cambiarEstado(' + p.id + ',\'rechazado\')">❌ Marcar como Rechazado</button>';
  }
  if (ef === 'aceptado' || ef === 'rechazado') {
    html += '<button class="btn btn-ghost" style="width:100%" onclick="abrirEnvio(' + p.id + ');closeSide()">↺ Reenviar enlace</button>';
  }
  html += '</div>';

  document.getElementById('side-bd').innerHTML = html;
  document.getElementById('side-bg').classList.add('open');
  document.getElementById('side-panel').classList.add('open');
}

function closeSide() {
  document.getElementById('side-bg').classList.remove('open');
  document.getElementById('side-panel').classList.remove('open');
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fn(n) { return Number(n||0).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fd(d) { if (!d) return '—'; var p = d.split('-'); return p.length === 3 ? p[2]+'/'+p[1]+'/'+p[0] : d; }
function fdt(d) { if (!d) return '—'; var dt = new Date(d); return dt.toLocaleDateString('es-ES') + ' ' + dt.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + (type||'info');
  setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
cargar();
setInterval(cargar, 30000); // refresco automático cada 30 seg
</script>
