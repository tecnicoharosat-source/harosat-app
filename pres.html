<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>HAROSAT · Presupuestos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#e8edf3;min-height:100vh;}
.hdr{background:#161b22;border-bottom:2px solid #3B8AC7;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{font-weight:800;font-size:20px;color:#e8edf3;display:flex;align-items:center;}
.logo b{color:#3B8AC7;}
.logo small{font-size:11px;font-weight:400;color:#7a8898;letter-spacing:2px;text-transform:uppercase;border-left:1px solid #2a3444;padding-left:10px;margin-left:8px;}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #2a3444;}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#7a8898;cursor:pointer;border-bottom:3px solid transparent;}
.tab.on{color:#3B8AC7;border-bottom-color:#3B8AC7;background:rgba(59,138,199,.07);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#2a3444;}
.stat{background:#161b22;padding:10px;text-align:center;}
.sv{font-size:20px;font-weight:800;line-height:1;}
.sl{font-size:10px;color:#7a8898;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#161b22;border-bottom:1px solid #2a3444;flex-wrap:wrap;}
.src{flex:1;min-width:140px;background:#0d1117;border:1px solid #2a3444;border-radius:6px;color:#e8edf3;padding:7px 12px;font-size:13px;outline:none;}
.src:focus{border-color:#3B8AC7;}
.flt{background:#0d1117;border:1px solid #2a3444;border-radius:6px;color:#e8edf3;padding:7px 10px;font-size:12px;outline:none;}
.btn{padding:7px 14px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.b1{background:#1a7fd4;color:#fff;}
.b2{background:#2ea44f;color:#fff;}
.b3{background:#e53935;color:#fff;}
.b4{background:#1e2530;color:#7a8898;border:1px solid #2a3444;}
.b5{background:#f9a825;color:#111;}
.b6{background:#25D366;color:#fff;}
.b7{background:#EA4335;color:#fff;}
.sm{padding:4px 9px;font-size:11px;}
.wrap{padding:12px 16px;}
.list{display:flex;flex-direction:column;gap:8px;}
.card{background:#161b22;border:1px solid #2a3444;border-radius:10px;overflow:hidden;}
.card:hover{border-color:#3B8AC7;}
.ch{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;}
.cn{font-size:11px;font-weight:700;color:#3B8AC7;letter-spacing:1px;margin-top:2px;}
.cm{flex:1;min-width:0;padding-left:6px;}
.cc{font-size:16px;font-weight:700;color:#e8edf3;}
.cd2{font-size:12px;color:#7a8898;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.ca{font-size:18px;font-weight:800;color:#FDB913;}
.cf{font-size:11px;color:#4a5568;}
.det{display:none;border-top:1px solid #2a3444;padding:12px 14px;background:#1e2530;}
.det.op{display:block;}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.df label{font-size:10px;text-transform:uppercase;color:#4a5568;display:block;margin-bottom:2px;}
.df span{font-size:13px;color:#e8edf3;font-weight:500;}
.da{display:flex;flex-wrap:wrap;gap:6px;padding-top:10px;border-top:1px solid #2a3444;}
.bdg{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.pe{background:rgba(253,185,19,.15);color:#FDB913;border:1px solid rgba(253,185,19,.3);}
.ac{background:rgba(46,164,79,.15);color:#2ea44f;border:1px solid rgba(46,164,79,.3);}
.re{background:rgba(229,57,53,.15);color:#e53935;border:1px solid rgba(229,57,53,.3);}
.tc{background:rgba(224,112,32,.15);color:#e07020;border:1px solid rgba(224,112,32,.3);}
.ta{background:rgba(59,138,199,.15);color:#3B8AC7;border:1px solid rgba(59,138,199,.3);}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end;justify-content:center;}
.ov.op{display:flex;}
.mod{background:#161b22;border:1px solid #2a3444;border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:95vh;overflow-y:auto;animation:su .2s ease-out;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #2a3444;position:sticky;top:0;background:#161b22;z-index:5;}
.mt{font-size:18px;font-weight:800;}
.mx{background:none;border:none;color:#7a8898;font-size:24px;cursor:pointer;padding:4px;}
.mb2{padding:16px 20px 24px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#7a8898;margin-bottom:4px;font-weight:600;}
.fg input,.fg select,.fg textarea{width:100%;background:#0d1117;border:1px solid #2a3444;border-radius:7px;color:#e8edf3;padding:9px 12px;font-size:14px;outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#3B8AC7;}
.fg textarea{resize:vertical;min-height:60px;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.r3{display:grid;grid-template-columns:60px 1fr 95px;gap:8px;}
select option{background:#1e2530;}
.tsel{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.tb{padding:14px;border:2px solid #2a3444;border-radius:10px;background:#0d1117;color:#7a8898;cursor:pointer;text-align:center;font-size:14px;font-weight:700;}
.tb.on{border-color:#3B8AC7;background:rgba(59,138,199,.1);color:#3B8AC7;}
.ti{font-size:24px;display:block;margin-bottom:4px;}
.lb{background:#0d1117;border:1px solid #2a3444;border-radius:8px;padding:12px;margin-bottom:12px;}
.lt{font-size:11px;font-weight:700;letter-spacing:1px;color:#3B8AC7;text-transform:uppercase;margin-bottom:10px;}
.li{background:#1e2530;border:1px solid #2a3444;border-radius:6px;padding:10px;margin-bottom:8px;}
.lh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ln{font-size:11px;color:#4a5568;font-weight:600;}
.ld{background:none;border:none;color:#e53935;font-size:18px;cursor:pointer;}
.la{width:100%;background:rgba(59,138,199,.1);border:1px dashed #3B8AC7;border-radius:6px;color:#3B8AC7;padding:8px;font-size:13px;font-weight:700;cursor:pointer;}
.nb{background:#0d1117;border:1px solid #2a3444;border-radius:8px;padding:12px;margin-bottom:12px;}
.nc{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;cursor:pointer;}
.nc input{width:16px;height:16px;min-width:16px;margin-top:2px;accent-color:#3B8AC7;}
.nt strong{color:#e8edf3;display:block;font-size:12px;margin-bottom:1px;}
.nt span{font-size:11px;color:#7a8898;line-height:1.4;}
.tot{background:#1e2530;border:1px solid #2a3444;border-radius:8px;padding:12px;margin-bottom:12px;}
.tr2{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;}
.tr2 span:first-child{color:#7a8898;}
.tr2 span:last-child{font-weight:600;}
.trf{border-top:1px solid #2a3444;margin-top:6px;padding-top:8px;}
.trf span:last-child{color:#FDB913;font-size:18px;font-weight:700;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid #2a3444;flex-wrap:wrap;}
.sb{background:#0d1117;border:1px solid #2a3444;border-radius:8px;padding:14px;margin-bottom:14px;}
.st{font-size:11px;text-transform:uppercase;color:#4a5568;margin-bottom:10px;font-weight:600;}
.fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;background:#3B8AC7;color:#fff;border:none;border-radius:50%;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(59,138,199,.5);z-index:90;display:flex;align-items:center;justify-content:center;}
.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e2530;border:1px solid #2a3444;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s;white-space:nowrap;}
.tst.on{transform:translateX(-50%) translateY(0);}
.tst.s{border-color:#2ea44f;color:#2ea44f;}
.tst.e{border-color:#e53935;color:#e53935;}
.tst.i{border-color:#3B8AC7;color:#3B8AC7;}
.empty{text-align:center;padding:50px 20px;color:#4a5568;}
@media(max-width:380px){.stats{grid-template-columns:repeat(2,1fr);}.r2{grid-template-columns:1fr;}.r3{grid-template-columns:54px 1fr 85px;}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">HAROSAT<b>·</b><small>Presupuestos</small></div>
  <div style="display:flex;gap:6px">
    <button class="btn b4 sm" onclick="expCSV()">CSV</button>
    <button class="btn b1 sm" onclick="nuevo()">+ Nuevo</button>
  </div>
</div>
<div class="tabs">
  <div class="tab on" id="tt" onclick="tab('todos')">Todos</div>
  <div class="tab" id="tp" onclick="tab('pendiente')">Pendientes</div>
  <div class="tab" id="ta2" onclick="tab('aceptado')">Aceptados</div>
  <div class="tab" id="tr2" onclick="tab('rechazado')">Rechazados</div>
</div>
<div class="stats">
  <div class="stat"><div class="sv" id="s1" style="color:#3B8AC7">0</div><div class="sl">Total</div></div>
  <div class="stat"><div class="sv" id="s2" style="color:#FDB913">0</div><div class="sl">Pendientes</div></div>
  <div class="stat"><div class="sv" id="s3" style="color:#2ea44f">0</div><div class="sl">Aceptados</div></div>
  <div class="stat"><div class="sv" id="s4" style="color:#2ea44f">0</div><div class="sl">Facturado</div></div>
</div>
<div class="bar">
  <input class="src" type="text" placeholder="🔍 Buscar…" oninput="render()" id="bq">
  <select class="flt" onchange="render()" id="ft">
    <option value="">Todos</option>
    <option value="caldera">🔥 Calderas</option>
    <option value="aire">❄️ Aire/BC</option>
  </select>
</div>
<div class="wrap"><div id="lst" class="list"><div class="empty">Conectando…</div></div></div>
<button class="fab" onclick="nuevo()">+</button>

<!-- MODAL FORMULARIO -->

<div class="ov" id="of" onclick="if(event.target===this)cM('of')">
 <div class="mod">
  <div class="mh"><span class="mt" id="ftit">Nuevo Presupuesto</span><button class="mx" onclick="cM('of')">×</button></div>
  <div class="mb2">
   <div class="fg"><label>Tipo</label>
    <div class="tsel">
     <div class="tb on" id="tc" onclick="tipo('caldera')"><span class="ti">🔥</span>Caldera</div>
     <div class="tb" id="ta3" onclick="tipo('aire')"><span class="ti">❄️</span>Aire/BC</div>
    </div>
   </div>
   <input type="hidden" id="fi"><input type="hidden" id="ftp" value="caldera">
   <div class="r2">
    <div class="fg"><label>Nº Presupuesto</label><input type="text" id="fn" placeholder="HS/26/24"></div>
    <div class="fg"><label>Fecha</label><input type="date" id="ff"></div>
   </div>
   <div class="fg"><label>Cliente</label><input type="text" id="fcl" placeholder="Nombre completo"></div>
   <div class="fg"><label>Dirección</label><input type="text" id="fd"></div>
   <div class="r2">
    <div class="fg"><label>CP y localidad</label><input type="text" id="fd2" placeholder="26200 Haro"></div>
    <div class="fg"><label>DNI/NIF</label><input type="text" id="fdn"></div>
   </div>
   <div class="lb">
    <div class="lt">📋 Conceptos</div>
    <div id="lc"></div>
    <button class="la" onclick="addL()">+ Añadir línea</button>
   </div>
   <div class="r2">
    <div class="fg"><label>IVA</label>
     <select id="fiv" onchange="calcT()"><option value="21">21%</option><option value="10">10%</option><option value="0">0%</option></select>
    </div>
    <div class="fg"><label>Forma de pago</label>
     <select id="fpg"><option value="60/30/10">60%–30%–10%</option><option value="50/50">50%–50%</option><option value="100">100% inicio</option><option value="contado">Contado</option></select>
    </div>
   </div>
   <div class="tot">
    <div class="tr2"><span>Base imponible</span><span id="tb3">0,00 €</span></div>
    <div class="tr2"><span id="til">IVA (21%) — NO INCLUIDO</span><span id="tiv">0,00 €</span></div>
    <div class="tr2 trf"><span>TOTAL CON IVA</span><span id="tto">0,00 €</span></div>
   </div>
   <div class="fg"><label>Observaciones</label><textarea id="fob" placeholder="- Garantía: un año.&#10;- Albañilería no incluida."></textarea></div>
   <div class="nb">
    <div class="lt">📌 Notas al pie</div>
    <label class="nc"><input type="checkbox" id="na1" checked><div class="nt"><strong>Materiales</strong><span>Pertenecen a la empresa hasta el pago total.</span></div></label>
    <label class="nc" id="wh"><input type="checkbox" id="na2"><div class="nt"><strong>Humos (caldera)</strong><span>Reutilización conducto existente.</span></div></label>
    <label class="nc" id="wb"><input type="checkbox" id="na3"><div class="nt"><strong>Bomba condensados</strong><span>Si necesaria +148€ IVA inc.</span></div></label>
    <label class="nc"><input type="checkbox" id="na4" checked><div class="nt"><strong>Albañilería/electricidad</strong><span>No incluidas.</span></div></label>
    <label class="nc"><input type="checkbox" id="na5" checked><div class="nt"><strong>Garantía</strong><span>1 año instalación + fabricante.</span></div></label>
   </div>
   <div class="fg"><label>Estado</label>
    <select id="fes"><option value="pendiente">⏳ Pendiente</option><option value="aceptado">✅ Aceptado</option><option value="rechazado">❌ Rechazado</option></select>
   </div>
   <div class="mf">
    <button class="btn b4" onclick="cM('of')">Cancelar</button>
    <button class="btn b5" onclick="gPDF()">💾 Guardar y PDF</button>
    <button class="btn b1" onclick="guardar(true)">Guardar</button>
   </div>
  </div>
 </div>
</div>

<!-- MODAL PDF -->

<div class="ov" id="op" onclick="if(event.target===this)cM('op')">
 <div class="mod">
  <div class="mh"><span class="mt">📄 PDF y compartir</span><button class="mx" onclick="cM('op')">×</button></div>
  <div class="mb2">
   <div id="pr" style="background:#0d1117;border:1px solid #2a3444;border-radius:8px;padding:14px;margin-bottom:14px;font-size:13px;line-height:1.8;"></div>
   <div class="sb"><div class="st">Descargar</div><div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn b1" onclick="dlPDF()">⬇️ PDF</button>
    <button class="btn b4" id="bn" style="display:none" onclick="shNat()">📤 Compartir</button>
   </div></div>
   <div class="sb"><div class="st">Compartir</div><div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn b6" onclick="shWA()">💬 WhatsApp</button>
    <button class="btn b7" onclick="shGm()">✉️ Gmail</button>
   </div></div>
   <div class="mf"><button class="btn b4" onclick="cM('op')">Cerrar</button></div>
  </div>
 </div>
</div>

<div class="tst" id="tst"></div>
<script>
const SB='https://sobiyfyzalynxcpfoldc.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvYml5Znl6YWx5bnhjcGZvbGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTA0MjksImV4cCI6MjA4ODU4NjQyOX0.FJOYHGjk-UI-SfEpZ2ytOvUJuTb4kGL9aBqj2ChXgek';
const TB='presupuestos_v2';
const H={'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=representation'};
const E={dir:'Sta. Lucía, 66, BJ – 26200 Haro – La Rioja',tel:'640 05 64 84',email:'harosatecnicos@gmail.com',cif:'09302345H',nif:'NIF.. 09302345 H',tec:'Harosat Ecotechnical\nTécnico instalador autorizado',rgpd:'Según RGPD (UE 2016/679), datos tratados con confidencialidad. Derechos: tecnicoharosat@gmail.com'};
let D=[],TAB='todos',L=[],PD=null;

// Carga con timeout — si falla muestra vacío y deja funcionar la app
async function load(){
document.getElementById(‘lst’).innerHTML=’<div class="empty">Cargando…</div>’;
try{
const ctrl=new AbortController();
const tid=setTimeout(()=>ctrl.abort(),6000);
const r=await fetch(`${SB}/rest/v1/${TB}?select=*&order=created_at.desc`,{headers:H,signal:ctrl.signal});
clearTimeout(tid);
if(!r.ok)throw new Error(’Error ’+(await r.json()).message);
D=await r.json();
}catch(e){
D=[];
document.getElementById(‘lst’).innerHTML=`<div class="empty" style="color:#e53935">⚠️ Sin conexión Supabase<br><small style="color:#7a8898">${e.message}</small><br><br><button class="btn b1 sm" onclick="load()" style="margin-top:8px">Reintentar</button></div>`;
stats([]);return;
}
render();
}

function tab(t){TAB=t;[‘tt’,‘tp’,‘ta2’,‘tr2’].forEach(i=>document.getElementById(i).classList.remove(‘on’));document.getElementById({todos:‘tt’,pendiente:‘tp’,aceptado:‘ta2’,rechazado:‘tr2’}[t]).classList.add(‘on’);render();}

function render(){
const b=document.getElementById(‘bq’).value.toLowerCase();
const f=document.getElementById(‘ft’).value;
const l=D.filter(d=>(!b||(d.cliente||’’).toLowerCase().includes(b)||(d.numero||’’).toLowerCase().includes(b))&&(!f||d.tipo===f)&&(TAB===‘todos’||d.estado===TAB));
stats(D);cards(l);
}

function stats(l){
document.getElementById(‘s1’).textContent=l.length;
document.getElementById(‘s2’).textContent=l.filter(d=>d.estado===‘pendiente’).length;
document.getElementById(‘s3’).textContent=l.filter(d=>d.estado===‘aceptado’).length;
const v=l.filter(d=>d.estado===‘aceptado’).reduce((s,d)=>s+(parseFloat(d.total_iva)||0),0);
document.getElementById(‘s4’).textContent=v>=1000?(v/1000).toFixed(1)+‘k€’:v.toFixed(0)+‘€’;
}

function cards(l){
const el=document.getElementById(‘lst’);
if(!l.length){el.innerHTML=’<div class="empty">📋 Sin presupuestos</div>’;return;}
el.innerHTML=l.map(d=>`<div class="card"> <div class="ch" onclick="tog(${d.id})"> <div> <div class="cn">${d.numero||'–'}</div> <div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap"> <span class="bdg ${d.estado==='pendiente'?'pe':d.estado==='aceptado'?'ac':'re'}">${{pendiente:'⏳ Pendiente',aceptado:'✅ Aceptado',rechazado:'❌ Rechazado'}[d.estado]||d.estado}</span> <span class="bdg ${d.tipo==='caldera'?'tc':'ta'}">${d.tipo==='caldera'?'🔥 Caldera':'❄️ Aire/BC'}</span> </div> </div> <div class="cm"><div class="cc">${d.cliente||'–'}</div><div class="cd2">${(d.dir1||'')+' '+(d.dir2||'')}</div></div> <div class="cr"><div class="ca">${fe(d.total_iva)}</div><div class="cf">${ff(d.fecha)}</div></div> </div> <div class="det" id="d${d.id}"> <div class="dg"> <div class="df"><label>Cliente</label><span>${d.cliente||'–'}</span></div> <div class="df"><label>Nº presupuesto</label><span>${d.numero||'–'}</span></div> <div class="df"><label>Fecha</label><span>${ff(d.fecha)}</span></div> <div class="df"><label>Base</label><span>${fe(d.base)}</span></div> <div class="df"><label>IVA (${d.iva||21}%)</label><span>${fe(d.cuota_iva)}</span></div> <div class="df"><label>Total IVA inc.</label><span style="color:#FDB913;font-weight:700">${fe(d.total_iva)}</span></div> </div> <div class="da"> <button class="btn b1 sm" onclick="openPDF(${d.id})">📄 PDF</button> <button class="btn b5 sm" onclick="editar(${d.id})">✏️ Editar</button> ${d.estado==='pendiente'?`<button class="btn b2 sm" onclick="chEst(${d.id},'aceptado')">✅ Aceptar</button><button class="btn b3 sm" onclick="chEst(${d.id},'rechazado')">❌ Rechazar</button>`:''} ${d.estado==='rechazado'?`<button class="btn b4 sm" onclick="chEst(${d.id},'pendiente')">↩ Reactivar</button>`:’’}
<button class="btn b3 sm" onclick="del(${d.id})">🗑</button>
</div>
</div>

  </div>`).join('');
}

function tog(id){document.getElementById(‘d’+id).classList.toggle(‘op’);}

function sigN(){
const y=new Date().getFullYear().toString().slice(-2);
const ns=D.map(d=>d.numero||’’).filter(n=>n.startsWith(`HS/${y}/`)).map(n=>parseInt(n.split(’/’)[2])||0);
return`HS/${y}/${(ns.length?Math.max(...ns):0)+1}`;
}

function nuevo(){
document.getElementById(‘ftit’).textContent=‘Nuevo Presupuesto’;
document.getElementById(‘fi’).value=’’;
document.getElementById(‘fn’).value=sigN();
document.getElementById(‘ff’).value=new Date().toISOString().slice(0,10);
[‘fcl’,‘fd’,‘fd2’,‘fdn’,‘fob’].forEach(i=>document.getElementById(i).value=’’);
document.getElementById(‘fiv’).value=‘21’;
document.getElementById(‘fpg’).value=‘60/30/10’;
document.getElementById(‘fes’).value=‘pendiente’;
document.getElementById(‘na1’).checked=true;
document.getElementById(‘na2’).checked=false;
document.getElementById(‘na3’).checked=false;
document.getElementById(‘na4’).checked=true;
document.getElementById(‘na5’).checked=true;
tipo(‘caldera’);L=[{cant:1,desc:’’,imp:’’}];renderL();calcT();
document.getElementById(‘of’).classList.add(‘op’);
}

function editar(id){
const d=D.find(x=>x.id===id);if(!d)return;
document.getElementById(‘ftit’).textContent=‘Editar Presupuesto’;
document.getElementById(‘fi’).value=d.id;
document.getElementById(‘fn’).value=d.numero||’’;
document.getElementById(‘ff’).value=d.fecha||’’;
document.getElementById(‘fcl’).value=d.cliente||’’;
document.getElementById(‘fd’).value=d.dir1||’’;
document.getElementById(‘fd2’).value=d.dir2||’’;
document.getElementById(‘fdn’).value=d.dni||’’;
document.getElementById(‘fiv’).value=d.iva||‘21’;
document.getElementById(‘fpg’).value=d.forma_pago||‘60/30/10’;
document.getElementById(‘fob’).value=d.observaciones||’’;
document.getElementById(‘fes’).value=d.estado||‘pendiente’;
const na=d.notas_activas||{};
document.getElementById(‘na1’).checked=na.n1!==false;
document.getElementById(‘na2’).checked=!!na.n2;
document.getElementById(‘na3’).checked=!!na.n3;
document.getElementById(‘na4’).checked=na.n4!==false;
document.getElementById(‘na5’).checked=na.n5!==false;
tipo(d.tipo||‘caldera’);
L=d.lineas?JSON.parse(d.lineas):[{cant:1,desc:’’,imp:’’}];
renderL();calcT();
document.getElementById(‘of’).classList.add(‘op’);
}

function tipo(t){
document.getElementById(‘ftp’).value=t;
document.getElementById(‘tc’).classList.toggle(‘on’,t===‘caldera’);
document.getElementById(‘ta3’).classList.toggle(‘on’,t===‘aire’);
document.getElementById(‘wh’).style.display=t===‘caldera’?’’:‘none’;
document.getElementById(‘wb’).style.display=t===‘caldera’?’’:‘none’;
}

function renderL(){
document.getElementById(‘lc’).innerHTML=L.map((l,i)=>`<div class="li"><div class="lh"><span class="ln">Línea ${i+1}</span>${L.length>1?`<button class="ld" onclick="delL(${i})">×</button>`:''}</div><div class="r3"><div class="fg" style="margin:0"><label>Cant.</label><input type="number" min="1" value="${l.cant||1}" onchange="upL(${i},'cant',this.value)" style="padding:7px 4px;text-align:center"></div><div class="fg" style="margin:0"><label>Descripción</label><textarea rows="3" onchange="upL(${i},'desc',this.value)" style="min-height:56px;font-size:13px">${l.desc||''}</textarea></div><div class="fg" style="margin:0"><label>Importe €</label><input type="number" min="0" step="0.01" value="${l.imp||''}" placeholder="0.00" oninput="upL(${i},'imp',this.value);calcT()" style="padding:7px 4px"></div></div></div>`).join(’’);
}
function addL(){L.push({cant:1,desc:’’,imp:’’});renderL();calcT();}
function delL(i){L.splice(i,1);renderL();calcT();}
function upL(i,k,v){L[i][k]=v;}
function calcT(){
const iv=parseFloat(document.getElementById(‘fiv’).value)||21;
const b=L.reduce((s,l)=>s+(parseFloat(l.imp)||0),0);
const c=b*iv/100;
document.getElementById(‘tb3’).textContent=fe(b);
document.getElementById(‘til’).textContent=`IVA (${iv}%) — NO INCLUIDO`;
document.getElementById(‘tiv’).textContent=fe(c);
document.getElementById(‘tto’).textContent=fe(b+c);
}

function mkP(){
const iv=parseFloat(document.getElementById(‘fiv’).value)||21;
const b=L.reduce((s,l)=>s+(parseFloat(l.imp)||0),0);
const c=b*iv/100;
return{tipo:document.getElementById(‘ftp’).value,numero:document.getElementById(‘fn’).value.trim(),fecha:document.getElementById(‘ff’).value,cliente:document.getElementById(‘fcl’).value.trim(),dir1:document.getElementById(‘fd’).value.trim(),dir2:document.getElementById(‘fd2’).value.trim(),dni:document.getElementById(‘fdn’).value.trim(),lineas:JSON.stringify(L),iva:iv,base:+b.toFixed(2),cuota_iva:+c.toFixed(2),total_iva:+(b+c).toFixed(2),forma_pago:document.getElementById(‘fpg’).value,observaciones:document.getElementById(‘fob’).value.trim(),estado:document.getElementById(‘fes’).value,notas_activas:{n1:document.getElementById(‘na1’).checked,n2:document.getElementById(‘na2’).checked,n3:document.getElementById(‘na3’).checked,n4:document.getElementById(‘na4’).checked,n5:document.getElementById(‘na5’).checked}};
}

async function guardar(cerrar=true){
const p=mkP();
if(!p.cliente){toast(‘Introduce el nombre del cliente’,‘e’);return null;}
try{
const id=document.getElementById(‘fi’).value;
const ctrl=new AbortController();
setTimeout(()=>ctrl.abort(),8000);
let r;
if(id)r=await fetch(`${SB}/rest/v1/${TB}?id=eq.${id}`,{method:‘PATCH’,headers:H,body:JSON.stringify(p),signal:ctrl.signal});
else r=await fetch(`${SB}/rest/v1/${TB}`,{method:‘POST’,headers:H,body:JSON.stringify(p),signal:ctrl.signal});
if(!r.ok){const e=await r.json();throw new Error(e.message||‘Error’);}
const res=await r.json();
toast(‘Guardado’,‘s’);
if(cerrar)cM(‘of’);
await load();
return id?parseInt(id):(Array.isArray(res)?res[0].id:res.id);
}catch(e){toast(’Error: ’+e.message,‘e’);return null;}
}

async function gPDF(){const id=await guardar(false);if(!id)return;cM(‘of’);setTimeout(()=>openPDF(id),400);}

async function chEst(id,est){
try{
const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);
await fetch(`${SB}/rest/v1/${TB}?id=eq.${id}`,{method:‘PATCH’,headers:H,body:JSON.stringify({estado:est}),signal:ctrl.signal});
toast(‘Actualizado’,‘s’);load();
}catch(e){toast(‘Error’,‘e’);}
}

async function del(id){
if(!confirm(’¿Eliminar?’))return;
try{
const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);
await fetch(`${SB}/rest/v1/${TB}?id=eq.${id}`,{method:‘DELETE’,headers:H,signal:ctrl.signal});
toast(‘Eliminado’,‘i’);load();
}catch(e){toast(‘Error’,‘e’);}
}

function openPDF(id){
const d=D.find(x=>x.id===id);if(!d)return;PD=d;
document.getElementById(‘pr’).innerHTML=`<div style="font-size:10px;color:#4a5568;text-transform:uppercase;margin-bottom:6px">Resumen</div><strong style="color:#3B8AC7">${d.numero}</strong> — ${ff(d.fecha)}<br><strong>${d.cliente}</strong><br><span style="color:#7a8898;font-size:12px">${d.dir1||''} ${d.dir2||''}</span><br><span style="color:#FDB913;font-size:18px;font-weight:700">${fe(d.total_iva)}</span>`;
if(navigator.share)document.getElementById(‘bn’).style.display=’’;
document.getElementById(‘op’).classList.add(‘op’);
}

function mkPDF(d){
const {jsPDF}=window.jspdf;
const doc=new jsPDF({orientation:‘portrait’,unit:‘mm’,format:‘a4’});
const W=210,M=14,TW=182;
const na=d.notas_activas||{};
const la=d.lineas?JSON.parse(d.lineas):[];
const iv=d.iva||21;
const cab=p=>{
doc.setFillColor(25,70,125);doc.rect(0,0,W,30,‘F’);
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(20);doc.setTextColor(255,255,255);doc.text(‘HAROSAT’,M,13);
doc.setFontSize(9);doc.setFont(‘helvetica’,‘normal’);doc.setTextColor(180,210,255);doc.text(‘ECOTECHNICAL’,M,20);
doc.setFontSize(22);doc.setFont(‘helvetica’,‘bold’);doc.setTextColor(253,185,19);doc.text(‘PRESUPUESTO’,W-M,15,{align:‘right’});
doc.setFontSize(8);doc.setFont(‘helvetica’,‘normal’);doc.setTextColor(180,210,255);
if(p>1)doc.text(d.cliente||’’,M,26);
doc.text(`${d.numero||''} — ${ff(d.fecha)} — Pág. ${p}`,W-M,26,{align:‘right’});
};
const pie=()=>{
doc.setFillColor(25,70,125);doc.rect(0,279,W,18,‘F’);
doc.setFontSize(8);doc.setFont(‘helvetica’,‘normal’);doc.setTextColor(255,255,255);
doc.text(`${E.dir} | Tel.: ${E.tel}`,W/2,285,{align:‘center’});
doc.text(`${E.email} | C.I.F.: ${E.cif}`,W/2,290,{align:‘center’});
doc.setFontSize(6.5);doc.setTextColor(160,200,255);doc.text(E.rgpd,W/2,295,{align:‘center’,maxWidth:W-20});
};
cab(1);pie();let y=36;
doc.setFillColor(237,244,252);doc.rect(M,y,TW,34,‘F’);
doc.setDrawColor(59,138,199);doc.setLineWidth(0.4);doc.rect(M,y,TW,34);
doc.setFontSize(7.5);doc.setFont(‘helvetica’,‘bold’);doc.setTextColor(25,70,125);doc.text(‘CLIENTE’,M+4,y+6);
doc.setFontSize(11);doc.setFont(‘helvetica’,‘bold’);doc.setTextColor(15,15,15);doc.text(d.cliente||’’,M+4,y+14);
doc.setFontSize(9);doc.setFont(‘helvetica’,‘normal’);doc.setTextColor(50,50,50);
doc.text(d.dir1||’’,M+4,y+21);doc.text(d.dir2||’’,M+4,y+27);
if(d.dni)doc.text(`D.N.I.: ${d.dni}`,M+4,y+33);
const bx=M+TW/2+4;
[[‘Nº Presupuesto:’,d.numero||’’],[‘Fecha:’,ff(d.fecha)],[‘Página:’,‘1’]].forEach((r,i)=>{
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(8);doc.setTextColor(25,70,125);doc.text(r[0],bx,y+10+i*7);
doc.setFont(‘helvetica’,‘normal’);doc.setTextColor(15,15,15);doc.text(r[1],bx+40,y+10+i*7);
});
y+=40;
doc.setFillColor(25,70,125);doc.rect(M,y,TW,8,‘F’);
doc.setFontSize(9);doc.setFont(‘helvetica’,‘bold’);doc.setTextColor(255,255,255);
doc.text(‘Cant.’,M+3,y+5.5);doc.text(‘Descripción’,M+20,y+5.5);doc.text(‘Importe’,W-M-3,y+5.5,{align:‘right’});
y+=8;
la.forEach((l,i)=>{
const ds=doc.splitTextToSize(l.desc||’’,TW-52);
const rH=Math.max(14,ds.length*5+6);
if(i%2===0){doc.setFillColor(246,250,255);doc.rect(M,y,TW,rH,‘F’);}
doc.setFontSize(9);doc.setFont(‘helvetica’,‘bold’);doc.setTextColor(15,15,15);doc.text(String(l.cant||1),M+5,y+6);
doc.setFont(‘helvetica’,‘normal’);doc.setFontSize(8.5);ds.forEach((ln,j)=>doc.text(ln,M+20,y+6+j*5));
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(9);doc.text(fe(l.imp),W-M-3,y+6,{align:‘right’});
doc.setDrawColor(200,215,235);doc.setLineWidth(0.3);doc.line(M,y+rH,W-M,y+rH);
y+=rH;
});
y+=5;
const tx=W-M-65;
doc.setDrawColor(59,138,199);doc.setLineWidth(0.4);doc.line(tx-3,y-2,W-M,y-2);
[[`Base imponible`,fe(d.base)],[`IVA (${iv}%) IVA NO INCLUIDO`,fe(d.cuota_iva)]].forEach(([lb,vl])=>{
doc.setFont(‘helvetica’,‘normal’);doc.setFontSize(9);doc.setTextColor(40,40,40);
doc.text(lb,tx,y);doc.text(vl,W-M-3,y,{align:‘right’});y+=6;
});
doc.setFillColor(25,70,125);doc.rect(tx-3,y-4,W-M-(tx-3),9,‘F’);
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(10.5);doc.setTextColor(255,255,255);
doc.text(‘TOTAL CON IVA’,tx,y+2);doc.setTextColor(253,185,19);
doc.text(fe(d.total_iva),W-M-3,y+2,{align:‘right’});y+=12;
const pL=mkPago(d.forma_pago,d.base);
const pH=pL.length*5+12;
doc.setFillColor(244,252,244);doc.rect(M,y,TW,pH,‘F’);
doc.setDrawColor(90,159,62);doc.rect(M,y,TW,pH);
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(8);doc.setTextColor(25,70,125);doc.text(‘FORMA DE PAGO’,M+4,y+6);
doc.setFont(‘helvetica’,‘normal’);doc.setTextColor(20,20,20);pL.forEach((l,i)=>doc.text(l,M+4,y+12+i*5));
y+=pH+5;
if(d.observaciones){
const oL=doc.splitTextToSize(d.observaciones,TW-10);
const oH=oL.length*5+12;
doc.setFillColor(255,252,238);doc.rect(M,y,TW,oH,‘F’);
doc.setDrawColor(253,185,19);doc.rect(M,y,TW,oH);
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(8);doc.setTextColor(25,70,125);doc.text(‘OBSERVACIONES’,M+4,y+6);
doc.setFont(‘helvetica’,‘normal’);doc.setTextColor(20,20,20);oL.forEach((l,i)=>doc.text(l,M+4,y+12+i*5));
y+=oH+5;
}
const nA=mkN(na,d.tipo);
if(nA.length&&y<260){
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(8.5);doc.setTextColor(25,70,125);doc.text(‘NOTAS’,M,y+5);y+=11;
nA.forEach((nt,i)=>{const nL=doc.splitTextToSize(`${i+1}. ${nt}`,TW);doc.setFont(‘helvetica’,‘normal’);doc.setFontSize(8);doc.setTextColor(35,35,35);nL.forEach(l=>{if(y<272){doc.text(l,M,y);y+=4.5;}});y+=2;});
}
doc.addPage();cab(2);pie();y=36;
if(nA.length){
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(9);doc.setTextColor(25,70,125);doc.text(‘NOTAS’,M,y);y+=9;
nA.forEach((nt,i)=>{
const nL=doc.splitTextToSize(nt,TW-6);
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(8.5);doc.setTextColor(25,70,125);doc.text(`${i+1}.`,M,y);
doc.setFont(‘helvetica’,‘normal’);doc.setTextColor(35,35,35);nL.forEach((l,j)=>doc.text(l,M+6,y+j*4.5));
y+=nL.length*4.5+5;
});
}
if(d.observaciones){
y+=4;doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(9);doc.setTextColor(20,20,20);doc.text(‘Observaciones:’,M,y);y+=6;
d.observaciones.split(’\n’).forEach(l=>{doc.setFont(‘helvetica’,‘normal’);doc.setFontSize(8.5);doc.setTextColor(40,40,40);doc.text(`- ${l.replace(/^-\s*/,'')}`,M+2,y);y+=5;});
}
y=235;
doc.setFont(‘helvetica’,‘normal’);doc.setFontSize(8.5);doc.setTextColor(30,30,30);
doc.text(E.nif,M,y);doc.text(`DNI. ${d.dni||'____________'}`,W/2+5,y);y+=6;
E.tec.split(’\n’).forEach((l,i)=>doc.text(l,M,y+i*5));doc.text(‘Cliente:’,W/2+5,y);y+=20;
doc.setFont(‘helvetica’,‘bold’);doc.setFontSize(8);doc.setTextColor(25,70,125);
doc.text(‘Sello de la empresa’,M,y);doc.text(‘Firma del cliente’,W/2+5,y);y+=4;
doc.setDrawColor(100,120,160);doc.setLineWidth(0.4);
doc.rect(M,y,78,28);doc.rect(W/2+5,y,78,28);
return doc;
}

function mkPago(f,b){
if(f===‘60/30/10’){const x=v=>v.toFixed(2).replace(’.’,’,’);return[`- El 60% por adelantado (${x(b*.6)} €),`,`- El 30% a mitad de obra (${x(b*.3)} €),`,`- El 10% al finalizar (${x(b*.1)} €).`];}
if(f===‘50/50’){const h=(b*.5).toFixed(2).replace(’.’,’,’);return[`- El 50% por adelantado (${h} €).`,`- El 50% al finalizar (${h} €).`];}
if(f===‘100’)return[’- El 100% por adelantado.’];
return[’- Contado al finalizar los trabajos.’];
}
function mkN(na,tipo){
const a=[];
if(na.n1!==false)a.push(‘Todos los materiales pertenecen a la empresa instaladora hasta que se realice el pago total de las cantidades recogidas en este presupuesto.’);
if(tipo===‘caldera’&&na.n2)a.push(‘NOTA TÉCNICA EVACUACIÓN HUMOS: Se procederá a la reutilización del conducto existente tras verificación visual. El usuario acepta esta circunstancia. La adecuación y cumplimiento normativo del sistema preexistente es responsabilidad del titular. HAROSAT ECOTECHNICAL queda exonerada de cualquier responsabilidad derivada de defectos o fugas del conducto reutilizado.’);
if(tipo===‘caldera’&&na.n3)a.push(‘En caso de que fuese necesaria la instalación de bomba de condensados, el precio se incrementaría en 148,00 € (IVA incluido).’);
return a;
}
function dlPDF(){if(!PD)return;try{mkPDF(PD).save(`${PD.numero||'presupuesto'}.pdf`);toast(‘PDF descargado’,‘s’);}catch(e){toast(‘Error PDF: ‘+e.message,‘e’);}}
function shWA(){if(!PD)return;window.open(`https://wa.me/?text=${encodeURIComponent(`*HAROSAT ECOTECHNICAL*\nPresupuesto *${PD.numero}* — ${ff(PD.fecha)}\nCliente: ${PD.cliente}\nTotal: *${fe(PD.total_iva)}*`)}`, ‘_blank’);setTimeout(dlPDF,600);}
function shGm(){if(!PD)return;window.open(`mailto:?subject=${encodeURIComponent(`Presupuesto ${PD.numero} - HAROSAT`)}&body=${encodeURIComponent(`Estimado/a ${PD.cliente},\n\nAdjuntamos presupuesto solicitado:\nNº: ${PD.numero}\nFecha: ${ff(PD.fecha)}\nTotal: ${fe(PD.total_iva)}\n\nHAROSAT ECOTECHNICAL\nTel.: ${E.tel}`)}`, ‘_blank’);setTimeout(dlPDF,600);}
async function shNat(){if(!PD||!navigator.share)return;try{const b=mkPDF(PD).output(‘blob’);await navigator.share({files:[new File([b],`${PD.numero}.pdf`,{type:‘application/pdf’})],title:`Presupuesto ${PD.numero}`});}catch(e){if(e.name!==‘AbortError’)toast(‘Error’,‘e’);}}
function fe(v){if(v===null||v===undefined||v===’’)return’–’;return parseFloat(v).toLocaleString(‘es-ES’,{minimumFractionDigits:2,maximumFractionDigits:2})+’ €’;}
function ff(f){if(!f)return’–’;const[y,m,d]=f.split(’-’);return`${d}/${m}/${y}`;}
function toast(msg,t=‘i’){const el=document.getElementById(‘tst’);el.textContent=msg;el.className=`tst ${t} on`;setTimeout(()=>el.classList.remove(‘on’),3000);}
function cM(id){document.getElementById(id).classList.remove(‘op’);}
function expCSV(){const c=[‘numero’,‘tipo’,‘fecha’,‘cliente’,‘dir1’,‘dir2’,‘base’,‘iva’,‘cuota_iva’,‘total_iva’,‘estado’];const a=document.createElement(‘a’);a.href=‘data:text/csv;charset=utf-8,\uFEFF’+encodeURIComponent([c.join(’;’),…D.map(d=>c.map(k=>`"${(d[k]??'').toString().replace(/"/g,'""')}"`).join(’;’))].join(’\n’));a.download=`presupuestos_${new Date().toISOString().slice(0,10)}.csv`;a.click();}
load();
</script>
