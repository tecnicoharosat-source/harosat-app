<html lang="es">
<head>

<style>
:root{--blue:#3B8AC7;--yellow:#FDB913;--green:#5A9F3E;--red:#e04444;--orange:#e07020;--bg:#0d1117;--surface:#161b22;--surface2:#1e2530;--border:#2a3444;--text:#e8edf3;--muted:#7a8898;--dim:#4a5568;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e8edf3;min-height:100vh;}
.header{background:#161b22;border-bottom:2px solid #3B8AC7;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{font-weight:800;font-size:20px;display:flex;align-items:center;color:#e8edf3;}
.logo span{color:#3B8AC7;}
.logo small{font-size:11px;font-weight:400;color:#7a8898;letter-spacing:2px;text-transform:uppercase;border-left:1px solid #2a3444;padding-left:10px;margin-left:8px;}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #2a3444;}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#7a8898;cursor:pointer;border-bottom:3px solid transparent;}
.tab.active{color:#3B8AC7;border-bottom-color:#3B8AC7;background:rgba(59,138,199,.07);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#2a3444;border-bottom:1px solid #2a3444;}
.stat{background:#161b22;padding:10px 14px;text-align:center;}
.sval{font-size:20px;font-weight:800;line-height:1;}
.slbl{font-size:10px;color:#7a8898;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#161b22;border-bottom:1px solid #2a3444;flex-wrap:wrap;}
.search{flex:1;min-width:140px;background:#0d1117;border:1px solid #2a3444;border-radius:6px;color:#e8edf3;padding:7px 12px;font-size:13px;outline:none;}
.search:focus{border-color:#3B8AC7;}
.fsel{background:#0d1117;border:1px solid #2a3444;border-radius:6px;color:#e8edf3;padding:7px 10px;font-size:12px;outline:none;}
.btn{padding:7px 14px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.bp{background:#1a7fd4;color:#fff;box-shadow:0 2px 8px rgba(26,127,212,.4);}
.bs{background:#2ea44f;color:#fff;box-shadow:0 2px 8px rgba(46,164,79,.4);}
.bd{background:#e53935;color:#fff;}
.bg{background:#1e2530;color:#7a8898;border:1px solid #2a3444;}
.by{background:#f9a825;color:#111;box-shadow:0 2px 8px rgba(249,168,37,.4);}
.bw{background:#25D366;color:#fff;}
.bm{background:#EA4335;color:#fff;}
.bsm{padding:4px 9px;font-size:11px;}
.content{padding:12px 16px;}
.cards{display:flex;flex-direction:column;gap:8px;}
.card{background:#161b22;border:1px solid #2a3444;border-radius:10px;overflow:hidden;}
.card:hover{border-color:#3B8AC7;}
.ch{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;cursor:pointer;}
.cnum{font-size:11px;font-weight:700;color:#3B8AC7;letter-spacing:1px;white-space:nowrap;margin-top:2px;}
.cm{flex:1;min-width:0;}
.ccli{font-size:16px;font-weight:700;color:#e8edf3;line-height:1.2;}
.cdesc{font-size:12px;color:#7a8898;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:fit-content;}
.camt{font-size:18px;font-weight:800;color:#FDB913;}
.cdate{font-size:11px;color:#4a5568;}
.cd{display:none;border-top:1px solid #2a3444;padding:12px 14px;background:#1e2530;}
.cd.open{display:block;}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.df label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#4a5568;display:block;margin-bottom:2px;}
.df span{font-size:13px;color:#e8edf3;font-weight:500;}
.da{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:10px;border-top:1px solid #2a3444;}
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.bp2{background:rgba(253,185,19,.15);color:#FDB913;border:1px solid rgba(253,185,19,.3);}
.ba{background:rgba(90,159,62,.15);color:#5A9F3E;border:1px solid rgba(90,159,62,.3);}
.br{background:rgba(224,68,68,.15);color:#e04444;border:1px solid rgba(224,68,68,.3);}
.bc{background:rgba(224,112,32,.15);color:#e07020;border:1px solid rgba(224,112,32,.3);}
.bai{background:rgba(59,138,199,.15);color:#3B8AC7;border:1px solid rgba(59,138,199,.3);}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
.modal{background:#161b22;border:1px solid #2a3444;border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:95vh;overflow-y:auto;animation:su .25s ease-out;}
@keyframes su{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #2a3444;position:sticky;top:0;background:#161b22;z-index:10;}
.mt{font-size:18px;font-weight:800;color:#e8edf3;}
.mc{background:none;border:none;color:#7a8898;font-size:24px;cursor:pointer;}
.mb{padding:16px 20px 24px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#7a8898;margin-bottom:5px;font-weight:600;}
.fg input,.fg select,.fg textarea{width:100%;background:#0d1117;border:1px solid #2a3444;border-radius:7px;color:#e8edf3;padding:9px 12px;font-size:14px;outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#3B8AC7;}
.fg textarea{resize:vertical;min-height:65px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:64px 1fr 100px;gap:8px;}
select option{background:#1e2530;}
.tsel{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.tbtn{padding:14px;border:2px solid #2a3444;border-radius:10px;background:#0d1117;color:#7a8898;cursor:pointer;text-align:center;font-size:15px;font-weight:700;}
.tbtn.sel{border-color:#3B8AC7;background:rgba(59,138,199,.1);color:#3B8AC7;}
.ticon{font-size:26px;display:block;margin-bottom:4px;}
.lbox{background:#0d1117;border:1px solid #2a3444;border-radius:8px;padding:12px;margin-bottom:12px;}
.ltit{font-size:12px;font-weight:700;letter-spacing:1px;color:#3B8AC7;text-transform:uppercase;margin-bottom:10px;}
.litem{background:#1e2530;border:1px solid #2a3444;border-radius:6px;padding:10px;margin-bottom:8px;}
.lh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.lnum{font-size:11px;color:#4a5568;font-weight:600;}
.ldel{background:none;border:none;color:#e04444;font-size:18px;cursor:pointer;}
.ladd{width:100%;background:rgba(59,138,199,.1);border:1px dashed #3B8AC7;border-radius:6px;color:#3B8AC7;padding:8px;font-size:13px;font-weight:700;cursor:pointer;}
.nbox{background:#0d1117;border:1px solid #2a3444;border-radius:8px;padding:12px;margin-bottom:12px;}
.nc{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;cursor:pointer;}
.nc input{width:16px;height:16px;min-width:16px;margin-top:2px;accent-color:#3B8AC7;}
.nct strong{color:#e8edf3;display:block;font-size:12px;margin-bottom:2px;}
.nct span{font-size:11px;color:#7a8898;line-height:1.4;}
.tbox{background:#1e2530;border:1px solid #2a3444;border-radius:8px;padding:12px;margin-bottom:12px;}
.tr{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;}
.tr span:first-child{color:#7a8898;}
.tr span:last-child{font-weight:600;color:#e8edf3;}
.tf{border-top:1px solid #2a3444;margin-top:6px;padding-top:8px;font-weight:700;}
.tf span:last-child{color:#FDB913;font-size:18px;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #2a3444;flex-wrap:wrap;}
.sbox{background:#0d1117;border:1px solid #2a3444;border-radius:8px;padding:14px;margin-bottom:14px;}
.stit{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#4a5568;margin-bottom:10px;font-weight:600;}
.sbts{display:flex;flex-wrap:wrap;gap:8px;}
.fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;background:#3B8AC7;color:#fff;border:none;border-radius:50%;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(59,138,199,.5);z-index:90;display:flex;align-items:center;justify-content:center;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e2530;border:1px solid #2a3444;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.s{border-color:#5A9F3E;color:#5A9F3E;}
.toast.e{border-color:#e04444;color:#e04444;}
.toast.i{border-color:#3B8AC7;color:#3B8AC7;}
.empty{text-align:center;padding:60px 20px;color:#4a5568;}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #2a3444;border-top-color:#3B8AC7;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:380px){.stats{grid-template-columns:repeat(2,1fr);}.fr{grid-template-columns:1fr;}.fr3{grid-template-columns:56px 1fr 90px;}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">HAROSAT<span>·</span><small>Presupuestos</small></div>
  <div style="display:flex;gap:6px;">
    <button class="btn bg bsm" onclick="exportCSV()">CSV</button>
    <button class="btn bp bsm" onclick="abrirNuevo()">+ Nuevo</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" id="tab-todos" onclick="setTab('todos')">Todos</div>
  <div class="tab" id="tab-pendiente" onclick="setTab('pendiente')">Pendientes</div>
  <div class="tab" id="tab-aceptado" onclick="setTab('aceptado')">Aceptados</div>
  <div class="tab" id="tab-rechazado" onclick="setTab('rechazado')">Rechazados</div>
</div>
<div class="stats">
  <div class="stat"><div class="sval" id="st-t" style="color:#3B8AC7">–</div><div class="slbl">Total</div></div>
  <div class="stat"><div class="sval" id="st-p" style="color:#FDB913">–</div><div class="slbl">Pendientes</div></div>
  <div class="stat"><div class="sval" id="st-a" style="color:#5A9F3E">–</div><div class="slbl">Aceptados</div></div>
  <div class="stat"><div class="sval" id="st-i" style="color:#5A9F3E">–</div><div class="slbl">Facturado</div></div>
</div>
<div class="toolbar">
  <input type="text" class="search" placeholder="🔍 Buscar…" oninput="renderAll()" id="buscar">
  <select class="fsel" onchange="renderAll()" id="filtro">
    <option value="">Todos</option>
    <option value="caldera">🔥 Calderas</option>
    <option value="aire">❄️ Aire/BC</option>
  </select>
</div>
<div class="content"><div id="cards" class="cards"><div class="empty"><div class="spin"></div>Cargando…</div></div></div>
<button class="fab" onclick="abrirNuevo()">+</button>

<div class="ov" id="ov-form" onclick="csiO(event,'ov-form')">
 <div class="modal">
  <div class="mh"><span class="mt" id="ftit">Nuevo Presupuesto</span><button class="mc" onclick="cM('ov-form')">×</button></div>
  <div class="mb">
   <div class="fg"><label>Tipo</label>
    <div class="tsel">
     <div class="tbtn sel" id="tb-c" onclick="selT('caldera')"><span class="ticon">🔥</span>Caldera</div>
     <div class="tbtn" id="tb-a" onclick="selT('aire')"><span class="ticon">❄️</span>Aire/BC</div>
    </div>
   </div>
   <input type="hidden" id="fid"><input type="hidden" id="ftipo" value="caldera">
   <div class="fr">
    <div class="fg"><label>Nº Presupuesto</label><input type="text" id="fnum" placeholder="HS/26/24"></div>
    <div class="fg"><label>Fecha</label><input type="date" id="ffecha"></div>
   </div>
   <div class="fg"><label>Cliente</label><input type="text" id="fcli" placeholder="Nombre completo"></div>
   <div class="fg"><label>Dirección</label><input type="text" id="fd1" placeholder="C/ Nombre, nº, piso"></div>
   <div class="fr">
    <div class="fg"><label>CP y localidad</label><input type="text" id="fd2" placeholder="26200 Haro – La Rioja"></div>
    <div class="fg"><label>DNI/NIF</label><input type="text" id="fdni" placeholder="12345678A"></div>
   </div>
   <div class="lbox">
    <div class="ltit">📋 Conceptos</div>
    <div id="lcont"></div>
    <button class="ladd" onclick="addL()">+ Añadir línea</button>
   </div>
   <div class="fr">
    <div class="fg"><label>IVA (%)</label>
     <select id="fiva" onchange="calcT()"><option value="21">21%</option><option value="10">10%</option><option value="0">0%</option></select>
    </div>
    <div class="fg"><label>Forma de pago</label>
     <select id="fpago"><option value="60/30/10">60%–30%–10%</option><option value="50/50">50%–50%</option><option value="100">100% inicio</option><option value="contado">Contado</option></select>
    </div>
   </div>
   <div class="tbox">
    <div class="tr"><span>Base imponible</span><span id="tb2">0,00 €</span></div>
    <div class="tr"><span id="tivl">IVA (21%) — NO INCLUIDO</span><span id="tiv">0,00 €</span></div>
    <div class="tr tf"><span>TOTAL CON IVA</span><span id="ttot">0,00 €</span></div>
   </div>
   <div class="fg"><label>Observaciones</label><textarea id="fobs" placeholder="- Garantía: un año.&#10;- Albañilería no incluida."></textarea></div>
   <div class="nbox">
    <div class="ltit">📌 Notas al pie</div>
    <label class="nc"><input type="checkbox" id="n1" checked><div class="nct"><strong>Nota 1 – Materiales</strong><span>Materiales de la empresa hasta pago total.</span></div></label>
    <label class="nc" id="wh"><input type="checkbox" id="n2"><div class="nct"><strong>Nota – Humos</strong><span>Reutilización conducto existente.</span></div></label>
    <label class="nc" id="wb"><input type="checkbox" id="n3"><div class="nct"><strong>Nota – Bomba condensados</strong><span>Si necesaria +148€ IVA inc.</span></div></label>
    <label class="nc"><input type="checkbox" id="n4" checked><div class="nct"><strong>Albañilería/electricidad</strong><span>No incluidas.</span></div></label>
    <label class="nc"><input type="checkbox" id="n5" checked><div class="nct"><strong>Garantía</strong><span>1 año instalación + fabricante.</span></div></label>
   </div>
   <div class="fg"><label>Estado</label>
    <select id="fest"><option value="pendiente">⏳ Pendiente</option><option value="aceptado">✅ Aceptado</option><option value="rechazado">❌ Rechazado</option></select>
   </div>
   <div class="mf">
    <button class="btn bg" onclick="cM('ov-form')">Cancelar</button>
    <button class="btn by" onclick="guardarYPDF()">💾 Guardar y PDF</button>
    <button class="btn bp" onclick="guardar(true)">Guardar</button>
   </div>
  </div>
 </div>
</div>

<div class="ov" id="ov-pdf" onclick="csiO(event,'ov-pdf')">
 <div class="modal">
  <div class="mh"><span class="mt">📄 PDF y compartir</span><button class="mc" onclick="cM('ov-pdf')">×</button></div>
  <div class="mb">
   <div id="pres" style="background:#0d1117;border:1px solid #2a3444;border-radius:8px;padding:14px;margin-bottom:14px;font-size:13px;line-height:1.8;"></div>
   <div class="sbox"><div class="stit">Descargar</div><div class="sbts"><button class="btn bp" onclick="dlPDF()">⬇️ PDF</button><button class="btn bg" id="bnat" style="display:none" onclick="shareNat()">📤 Compartir</button></div></div>
   <div class="sbox"><div class="stit">Compartir</div><div class="sbts"><button class="btn bw" onclick="shareWA()">💬 WhatsApp</button><button class="btn bm" onclick="shareGmail()">✉️ Gmail</button></div></div>
   <div class="mf"><button class="btn bg" onclick="cM('ov-pdf')">Cerrar</button></div>
  </div>
 </div>
</div>

<div class="toast" id="toast"></div>
<script>
const SB='https://sobiyfyzalynxcpfoldc.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvYml5Znl6YWx5bnhjcGZvbGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDg2MDI3MTAsImV4cCI6MjAyNDE3ODcxMH0.hxMFNKSJeQC5h5EGO3afJzKBpPNIAJmHE6_1bx5iuM0';
const TB='presupuestos_v2';
const H={'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=representation'};
const EMP={dir:'Sta. Lucía, 66, BJ – 26200 Haro – La Rioja',tel:'640 05 64 84',email:'harosatecnicos@gmail.com',cif:'09302345H',nif:'NIF.. 09302345 H',tec:'Harosat Ecotechnical\nTécnico instalador autorizado',rgpd:'Según RGPD (UE 2016/679), datos tratados con confidencialidad. Derechos: tecnicoharosat@gmail.com'};
let datos=[],tabAct='todos',lineas=[],pdfD=null;

function fetchTimeout(url,opts,ms=8000){
return Promise.race([fetch(url,opts),new Promise((_,r)=>setTimeout(()=>r(new Error(‘Timeout’)),ms))]);
}

async function cargar(){
try{
const r=await fetchTimeout(`${SB}/rest/v1/${TB}?select=*&order=created_at.desc`,{headers:H});
if(!r.ok){const e=await r.json();throw new Error(e.message||e.code||‘Error Supabase’);}
datos=await r.json();renderAll();
}catch(e){
document.getElementById(‘cards’).innerHTML=`<div class="empty" style="color:#e04444;">⚠️ Error: ${e.message}<br><br><button class="btn bp" onclick="cargar()">Reintentar</button></div>`;
actualizarStats([]);
}
}

function setTab(t){tabAct=t;document.querySelectorAll(’.tab’).forEach(x=>x.classList.remove(‘active’));document.getElementById(‘tab-’+t).classList.add(‘active’);renderAll();}
function renderAll(){
const b=document.getElementById(‘buscar’).value.toLowerCase();
const f=document.getElementById(‘filtro’).value;
const l=datos.filter(d=>(!b||(d.cliente||’’).toLowerCase().includes(b)||(d.numero||’’).toLowerCase().includes(b))&&(!f||d.tipo===f)&&(tabAct===‘todos’||d.estado===tabAct));
actualizarStats(datos);renderCards(l);
}
function actualizarStats(l){
document.getElementById(‘st-t’).textContent=l.length;
document.getElementById(‘st-p’).textContent=l.filter(d=>d.estado===‘pendiente’).length;
document.getElementById(‘st-a’).textContent=l.filter(d=>d.estado===‘aceptado’).length;
const i=l.filter(d=>d.estado===‘aceptado’).reduce((s,d)=>s+(parseFloat(d.total_iva)||0),0);
document.getElementById(‘st-i’).textContent=i>=1000?(i/1000).toFixed(1)+‘k€’:i.toFixed(0)+‘€’;
}
function renderCards(lista){
const el=document.getElementById(‘cards’);
if(!lista.length){el.innerHTML=’<div class="empty">📋 Sin presupuestos</div>’;return;}
el.innerHTML=lista.map(d=>`<div class="card"> <div class="ch" onclick="tog(${d.id})"> <div><div class="cnum">${d.numero||'–'}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;"><span class="badge ${d.estado==='pendiente'?'bp2':d.estado==='aceptado'?'ba':'br'}">${lEst(d.estado)}</span><span class="badge ${d.tipo==='caldera'?'bc':'bai'}">${d.tipo==='caldera'?'🔥 Caldera':'❄️ Aire/BC'}</span></div></div> <div class="cm" style="padding-left:8px;"><div class="ccli">${d.cliente||'–'}</div><div class="cdesc">${(d.dir1||'')+' '+(d.dir2||'')}</div></div> <div class="cr"><div class="camt">${fE(d.total_iva)}</div><div class="cdate">${fF(d.fecha)}</div></div> </div> <div class="cd" id="det-${d.id}"> <div class="dg"> <div class="df"><label>Cliente</label><span>${d.cliente||'–'}</span></div> <div class="df"><label>Nº presupuesto</label><span>${d.numero||'–'}</span></div> <div class="df"><label>Fecha</label><span>${fF(d.fecha)}</span></div> <div class="df"><label>Base</label><span>${fE(d.base)}</span></div> <div class="df"><label>IVA (${d.iva||21}%)</label><span>${fE(d.cuota_iva)}</span></div> <div class="df"><label>Total IVA inc.</label><span style="color:#FDB913;font-weight:700;">${fE(d.total_iva)}</span></div> </div> <div class="da"> <button class="btn bp bsm" onclick="abrirPDF(${d.id})">📄 PDF</button> <button class="btn by bsm" onclick="editarReg(${d.id})">✏️ Editar</button> ${d.estado==='pendiente'?`<button class="btn bs bsm" onclick="chEst(${d.id},'aceptado')">✅ Aceptar</button><button class="btn bd bsm" onclick="chEst(${d.id},'rechazado')">❌ Rechazar</button>`:''} ${d.estado==='rechazado'?`<button class="btn bg bsm" onclick="chEst(${d.id},'pendiente')">↩ Reactivar</button>`:’’}
<button class="btn bd bsm" onclick="eliminar(${d.id})">🗑</button>
</div>
</div>

  </div>`).join('');
}
function tog(id){document.getElementById('det-'+id).classList.toggle('open');}
function lEst(e){return{pendiente:'⏳ Pendiente',aceptado:'✅ Aceptado',rechazado:'❌ Rechazado'}[e]||e;}
function sigNum(){const y=new Date().getFullYear().toString().slice(-2);const ns=datos.map(d=>d.numero||'').filter(n=>n.startsWith(`HS/${y}/`)).map(n=>parseInt(n.split('/')[2])||0);return `HS/${y}/${(ns.length?Math.max(...ns):0)+1}`;}
function abrirNuevo(){
  document.getElementById('ftit').textContent='Nuevo Presupuesto';
  document.getElementById('fid').value='';document.getElementById('fnum').value=sigNum();
  document.getElementById('ffecha').value=new Date().toISOString().slice(0,10);
  ['fcli','fd1','fd2','fdni','fobs'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('fiva').value='21';document.getElementById('fpago').value='60/30/10';document.getElementById('fest').value='pendiente';
  document.getElementById('n1').checked=true;document.getElementById('n2').checked=false;document.getElementById('n3').checked=false;document.getElementById('n4').checked=true;document.getElementById('n5').checked=true;
  selT('caldera');lineas=[{cant:1,desc:'',imp:''}];renderL();calcT();
  document.getElementById('ov-form').classList.add('open');
}
function editarReg(id){
  const d=datos.find(x=>x.id===id);if(!d)return;
  document.getElementById('ftit').textContent='Editar Presupuesto';
  document.getElementById('fid').value=d.id;document.getElementById('fnum').value=d.numero||'';
  document.getElementById('ffecha').value=d.fecha||'';document.getElementById('fcli').value=d.cliente||'';
  document.getElementById('fd1').value=d.dir1||'';document.getElementById('fd2').value=d.dir2||'';
  document.getElementById('fdni').value=d.dni||'';document.getElementById('fiva').value=d.iva||'21';
  document.getElementById('fpago').value=d.forma_pago||'60/30/10';document.getElementById('fobs').value=d.observaciones||'';
  document.getElementById('fest').value=d.estado||'pendiente';
  const na=d.notas_activas||{};
  document.getElementById('n1').checked=na.n1!==false;document.getElementById('n2').checked=!!na.n2;
  document.getElementById('n3').checked=!!na.n3;document.getElementById('n4').checked=na.n4!==false;document.getElementById('n5').checked=na.n5!==false;
  selT(d.tipo||'caldera');lineas=d.lineas?JSON.parse(d.lineas):[{cant:1,desc:'',imp:''}];
  renderL();calcT();document.getElementById('ov-form').classList.add('open');
}
function selT(t){
  document.getElementById('ftipo').value=t;
  document.getElementById('tb-c').classList.toggle('sel',t==='caldera');
  document.getElementById('tb-a').classList.toggle('sel',t==='aire');
  document.getElementById('wh').style.display=t==='caldera'?'':'none';
  document.getElementById('wb').style.display=t==='caldera'?'':'none';
}
function renderL(){
  document.getElementById('lcont').innerHTML=lineas.map((l,i)=>`<div class="litem"><div class="lh"><span class="lnum">Línea ${i+1}</span>${lineas.length>1?`<button class="ldel" onclick="delL(${i})">×</button>`:''}</div><div class="fr3"><div class="fg" style="margin:0;"><label>Cant.</label><input type="number" min="1" value="${l.cant||1}" onchange="upL(${i},'cant',this.value)" style="padding:7px 6px;text-align:center;"></div><div class="fg" style="margin:0;"><label>Descripción</label><textarea rows="3" onchange="upL(${i},'desc',this.value)" style="min-height:58px;font-size:13px;">${l.desc||''}</textarea></div><div class="fg" style="margin:0;"><label>Importe €</label><input type="number" min="0" step="0.01" value="${l.imp||''}" placeholder="0.00" oninput="upL(${i},'imp',this.value);calcT();" style="padding:7px 6px;"></div></div></div>`).join('');
}
function addL(){lineas.push({cant:1,desc:'',imp:''});renderL();calcT();}
function delL(i){lineas.splice(i,1);renderL();calcT();}
function upL(i,k,v){lineas[i][k]=v;}
function calcT(){
  const iva=parseFloat(document.getElementById('fiva').value)||21;
  const base=lineas.reduce((s,l)=>s+(parseFloat(l.imp)||0),0);
  const cuota=base*iva/100;
  document.getElementById('tb2').textContent=fE(base);
  document.getElementById('tivl').textContent=`IVA (${iva}%) — NO INCLUIDO`;
  document.getElementById('tiv').textContent=fE(cuota);
  document.getElementById('ttot').textContent=fE(base+cuota);
}
function mkP(){
  const iva=parseFloat(document.getElementById('fiva').value)||21;
  const base=lineas.reduce((s,l)=>s+(parseFloat(l.imp)||0),0);
  const cuota=base*iva/100;
  return{tipo:document.getElementById('ftipo').value,numero:document.getElementById('fnum').value.trim(),fecha:document.getElementById('ffecha').value,cliente:document.getElementById('fcli').value.trim(),dir1:document.getElementById('fd1').value.trim(),dir2:document.getElementById('fd2').value.trim(),dni:document.getElementById('fdni').value.trim(),lineas:JSON.stringify(lineas),iva,base:+base.toFixed(2),cuota_iva:+cuota.toFixed(2),total_iva:+(base+cuota).toFixed(2),forma_pago:document.getElementById('fpago').value,observaciones:document.getElementById('fobs').value.trim(),estado:document.getElementById('fest').value,notas_activas:{n1:document.getElementById('n1').checked,n2:document.getElementById('n2').checked,n3:document.getElementById('n3').checked,n4:document.getElementById('n4').checked,n5:document.getElementById('n5').checked}};
}
async function guardar(cerrar=true){
  const p=mkP();if(!p.cliente){toast('Introduce el nombre del cliente','e');return null;}
  try{
    const id=document.getElementById('fid').value;
    let r;
    if(id)r=await fetchTimeout(`${SB}/rest/v1/${TB}?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify(p)});
    else r=await fetchTimeout(`${SB}/rest/v1/${TB}`,{method:'POST',headers:H,body:JSON.stringify(p)});
    if(!r.ok){const e=await r.json();throw new Error(e.message||'Error');}
    const res=await r.json();
    toast('Guardado','s');if(cerrar)cM('ov-form');await cargar();
    return id?parseInt(id):(Array.isArray(res)?res[0].id:res.id);
  }catch(e){toast('Error: '+e.message,'e');return null;}
}
async function guardarYPDF(){const id=await guardar(false);if(!id)return;cM('ov-form');setTimeout(()=>abrirPDF(id),400);}
async function chEst(id,est){await fetchTimeout(`${SB}/rest/v1/${TB}?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify({estado:est})});toast('Actualizado','s');cargar();}
async function eliminar(id){if(!confirm('¿Eliminar?'))return;await fetchTimeout(`${SB}/rest/v1/${TB}?id=eq.${id}`,{method:'DELETE',headers:H});toast('Eliminado','i');cargar();}
function abrirPDF(id){
  const d=datos.find(x=>x.id===id);if(!d)return;pdfD=d;
  document.getElementById('pres').innerHTML=`<div style="font-size:10px;color:#4a5568;text-transform:uppercase;margin-bottom:6px;">Resumen</div><strong style="color:#3B8AC7;">${d.numero}</strong> — ${fF(d.fecha)}<br><strong>${d.cliente}</strong><br><span style="color:#7a8898;font-size:12px;">${d.dir1||''} ${d.dir2||''}</span><br><span style="color:#FDB913;font-size:18px;font-weight:700;">${fE(d.total_iva)}</span>`;
  if(navigator.share)document.getElementById('bnat').style.display='';
  document.getElementById('ov-pdf').classList.add('open');
}
function genPDF(d){
  const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,ML=14,TW=182;const na=d.notas_activas||{};const linArr=d.lineas?JSON.parse(d.lineas):[];const iva=d.iva||21;
  const cab=(p)=>{
    doc.setFillColor(25,70,125);doc.rect(0,0,W,30,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(255,255,255);doc.text('HAROSAT',ML,13);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(180,210,255);doc.text('ECOTECHNICAL',ML,20);
    doc.setFontSize(22);doc.setFont('helvetica','bold');doc.setTextColor(253,185,19);doc.text('PRESUPUESTO',W-ML,15,{align:'right'});
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(180,210,255);
    if(p>1)doc.text(d.cliente||'',ML,26);
    doc.text(`${d.numero||''} — ${fF(d.fecha)} — Pág. ${p}`,W-ML,26,{align:'right'});
  };
  const pie=()=>{
    doc.setFillColor(25,70,125);doc.rect(0,279,W,18,'F');
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(255,255,255);
    doc.text(`${EMP.dir} | Tel.: ${EMP.tel}`,W/2,285,{align:'center'});
    doc.text(`${EMP.email} | C.I.F.: ${EMP.cif}`,W/2,290,{align:'center'});
    doc.setFontSize(6.5);doc.setTextColor(160,200,255);doc.text(EMP.rgpd,W/2,295,{align:'center',maxWidth:W-20});
  };
  cab(1);pie();let y=36;
  doc.setFillColor(237,244,252);doc.rect(ML,y,TW,34,'F');doc.setDrawColor(59,138,199);doc.setLineWidth(0.4);doc.rect(ML,y,TW,34);
  doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(25,70,125);doc.text('CLIENTE',ML+4,y+6);
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(15,15,15);doc.text(d.cliente||'',ML+4,y+14);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
  doc.text(d.dir1||'',ML+4,y+21);doc.text(d.dir2||'',ML+4,y+27);if(d.dni)doc.text(`D.N.I.: ${d.dni}`,ML+4,y+33);
  const bx=ML+TW/2+4;
  [['Nº Presupuesto:',d.numero||''],['Fecha:',fF(d.fecha)],['Página:','1']].forEach((r,i)=>{
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(25,70,125);doc.text(r[0],bx,y+10+i*7);
    doc.setFont('helvetica','normal');doc.setTextColor(15,15,15);doc.text(r[1],bx+40,y+10+i*7);
  });
  y+=40;
  doc.setFillColor(25,70,125);doc.rect(ML,y,TW,8,'F');doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('Cant.',ML+3,y+5.5);doc.text('Descripción',ML+20,y+5.5);doc.text('Importe',W-ML-3,y+5.5,{align:'right'});y+=8;
  linArr.forEach((l,i)=>{
    const desc=doc.splitTextToSize(l.desc||'',TW-52);const rH=Math.max(14,desc.length*5+6);
    if(i%2===0){doc.setFillColor(246,250,255);doc.rect(ML,y,TW,rH,'F');}
    doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(15,15,15);doc.text(String(l.cant||1),ML+5,y+6);
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);desc.forEach((ln,j)=>doc.text(ln,ML+20,y+6+j*5));
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text(fE(l.imp),W-ML-3,y+6,{align:'right'});
    doc.setDrawColor(200,215,235);doc.setLineWidth(0.3);doc.line(ML,y+rH,W-ML,y+rH);y+=rH;
  });
  y+=5;const tx=W-ML-65;doc.setDrawColor(59,138,199);doc.setLineWidth(0.4);doc.line(tx-3,y-2,W-ML,y-2);
  [[`Base imponible`,fE(d.base)],[`IVA (${iva}%) IVA NO INCLUIDO`,fE(d.cuota_iva)]].forEach(([lb,vl])=>{doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(40,40,40);doc.text(lb,tx,y);doc.text(vl,W-ML-3,y,{align:'right'});y+=6;});
  doc.setFillColor(25,70,125);doc.rect(tx-3,y-4,W-ML-(tx-3),9,'F');doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(255,255,255);doc.text('TOTAL CON IVA',tx,y+2);doc.setTextColor(253,185,19);doc.text(fE(d.total_iva),W-ML-3,y+2,{align:'right'});y+=12;
  const pL=mkPago(d.forma_pago,d.base);const pH=pL.length*5+12;
  doc.setFillColor(244,252,244);doc.rect(ML,y,TW,pH,'F');doc.setDrawColor(90,159,62);doc.rect(ML,y,TW,pH);
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(25,70,125);doc.text('FORMA DE PAGO',ML+4,y+6);
  doc.setFont('helvetica','normal');doc.setTextColor(20,20,20);pL.forEach((l,i)=>doc.text(l,ML+4,y+12+i*5));y+=pH+5;
  if(d.observaciones){const oL=doc.splitTextToSize(d.observaciones,TW-10);const oH=oL.length*5+12;doc.setFillColor(255,252,238);doc.rect(ML,y,TW,oH,'F');doc.setDrawColor(253,185,19);doc.rect(ML,y,TW,oH);doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(25,70,125);doc.text('OBSERVACIONES',ML+4,y+6);doc.setFont('helvetica','normal');doc.setTextColor(20,20,20);oL.forEach((l,i)=>doc.text(l,ML+4,y+12+i*5));y+=oH+5;}
  const nA=mkNotas(na,d.tipo);
  if(nA.length&&y<260){doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(25,70,125);doc.text('NOTAS',ML,y+5);y+=11;nA.forEach((nt,i)=>{const nL=doc.splitTextToSize(`${i+1}. ${nt}`,TW);doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(35,35,35);nL.forEach(l=>{if(y<272){doc.text(l,ML,y);y+=4.5;}});y+=2;});}
  doc.addPage();cab(2);pie();y=36;
  if(nA.length){doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(25,70,125);doc.text('NOTAS',ML,y);y+=9;nA.forEach((nt,i)=>{const nL=doc.splitTextToSize(nt,TW-6);doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(25,70,125);doc.text(`${i+1}.`,ML,y);doc.setFont('helvetica','normal');doc.setTextColor(35,35,35);nL.forEach((l,j)=>doc.text(l,ML+6,y+j*4.5));y+=nL.length*4.5+5;});}
  if(d.observaciones){y+=4;doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(20,20,20);doc.text('Observaciones:',ML,y);y+=6;d.observaciones.split('\n').forEach(l=>{doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(40,40,40);doc.text(`- ${l.replace(/^-\s*/,'')}`,ML+2,y);y+=5;});}
  y=235;doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(30,30,30);
  doc.text(EMP.nif,ML,y);doc.text(`DNI. ${d.dni||'____________'}`,W/2+5,y);y+=6;
  EMP.tec.split('\n').forEach((l,i)=>doc.text(l,ML,y+i*5));doc.text('Cliente:',W/2+5,y);y+=20;
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(25,70,125);
  doc.text('Sello de la empresa',ML,y);doc.text('Firma del cliente',W/2+5,y);y+=4;
  doc.setDrawColor(100,120,160);doc.setLineWidth(0.4);doc.rect(ML,y,78,28);doc.rect(W/2+5,y,78,28);
  return doc;
}
function mkPago(f,b){
  if(f==='60/30/10'){const x=v=>v.toFixed(2).replace('.',',');return[`- El 60% por adelantado (${x(b*.6)} €),`,`- El 30% a mitad de obra (${x(b*.3)} €),`,`- El 10% al finalizar (${x(b*.1)} €).`];}
  if(f==='50/50'){const h=(b*.5).toFixed(2).replace('.',',');return[`- El 50% por adelantado (${h} €).`,`- El 50% al finalizar (${h} €).`];}
  if(f==='100')return['- El 100% por adelantado.'];
  return['- Contado al finalizar los trabajos.'];
}
function mkNotas(na,tipo){
  const a=[];
  if(na.n1!==false)a.push('Todos los materiales pertenecen a la empresa instaladora hasta que se realice el pago total de las cantidades recogidas en este presupuesto.');
  if(tipo==='caldera'&&na.n2)a.push('NOTA TÉCNICA EVACUACIÓN HUMOS: Se procederá a la reutilización del conducto existente tras verificación visual. El usuario acepta esta circunstancia. La adecuación, estado y cumplimiento normativo del sistema preexistente son responsabilidad exclusiva del titular. HAROSAT ECOTECHNICAL queda exonerada de cualquier responsabilidad derivada de defectos, deterioros o fugas del conducto reutilizado.');
  if(tipo==='caldera'&&na.n3)a.push('En caso de que fuese necesaria la instalación de bomba de condensados, el precio se incrementaría en 148,00 € (IVA incluido).');
  return a;
}
function dlPDF(){if(!pdfD)return;try{genPDF(pdfD).save(`${pdfD.numero||'presupuesto'}.pdf`);toast('PDF descargado','s');}catch(e){toast('Error PDF','e');}}
function shareWA(){if(!pdfD)return;const d=pdfD;window.open(`https://wa.me/?text=${encodeURIComponent(`*HAROSAT ECOTECHNICAL*\nPresupuesto *${d.numero}* — ${fF(d.fecha)}\nCliente: ${d.cliente}\nTotal: *${fE(d.total_iva)}*`)}`, '_blank');setTimeout(dlPDF,600);}
function shareGmail(){if(!pdfD)return;const d=pdfD;window.open(`mailto:?subject=${encodeURIComponent(`Presupuesto ${d.numero} - HAROSAT`)}&body=${encodeURIComponent(`Estimado/a ${d.cliente},\n\nAdjuntamos presupuesto:\nNº: ${d.numero}\nFecha: ${fF(d.fecha)}\nTotal: ${fE(d.total_iva)}\n\nHAROSAT ECOTECHNICAL\nTel.: ${EMP.tel}`)}`, '_blank');setTimeout(dlPDF,600);}
async function shareNat(){if(!pdfD||!navigator.share)return;try{const b=genPDF(pdfD).output('blob');await navigator.share({files:[new File([b],`${pdfD.numero}.pdf`,{type:'application/pdf'})],title:`Presupuesto ${pdfD.numero}`});}catch(e){if(e.name!=='AbortError')toast('Error','e');}}
function fE(v){if(v===null||v===undefined||v==='')return'–';return parseFloat(v).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function fF(f){if(!f)return'–';const[y,m,d]=f.split('-');return`${d}/${m}/${y}`;}
function toast(msg,t='i'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast ${t} show`;setTimeout(()=>el.classList.remove('show'),3000);}
function cM(id){document.getElementById(id).classList.remove('open');}
function csiO(e,id){if(e.target===document.getElementById(id))cM(id);}
function exportCSV(){const cols=['numero','tipo','fecha','cliente','dir1','dir2','base','iva','cuota_iva','total_iva','estado'];const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent([cols.join(';'),...datos.map(d=>cols.map(c=>`"${(d[c]??'').toString().replace(/"/g,'""')}"`).join(';'))].join('\n'));a.download=`presupuestos_${new Date().toISOString().slice(0,10)}.csv`;a.click();}
cargar();
</script>
