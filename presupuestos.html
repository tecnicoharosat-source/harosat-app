<style>
:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1f2436;
  --border: #2a3050;
  --accent: #f97316;
  --accent2: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --purple: #a855f7;
  --text: #e8eaf0;
  --muted: #7480a0;
  --card: #1a1f32;
}

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: ‘Syne’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
}

/* HEADER */
header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 0 24px;
display: flex;
align-items: center;
justify-content: space-between;
height: 60px;
position: sticky;
top: 0;
z-index: 100;
}
.logo {
display: flex;
align-items: center;
gap: 10px;
font-size: 1rem;
font-weight: 800;
letter-spacing: 0.05em;
}
.logo-dot { width:8px; height:8px; border-radius:50%; background:var(–accent); display:inline-block; }
.logo span { color: var(–muted); font-weight: 400; font-size:.8rem; margin-left:4px; }

.header-actions { display: flex; gap:8px; align-items:center; }

/* STATS BAR */
.stats-bar {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 1px;
background: var(–border);
border-bottom: 1px solid var(–border);
}
.stat {
background: var(–surface);
padding: 14px 20px;
display: flex;
flex-direction: column;
gap: 2px;
}
.stat-val {
font-family: ‘DM Mono’, monospace;
font-size: 1.4rem;
font-weight: 500;
color: var(–text);
}
.stat-label {
font-size: .68rem;
color: var(–muted);
text-transform: uppercase;
letter-spacing: .08em;
}
.stat.orange .stat-val { color: var(–accent); }
.stat.blue .stat-val { color: var(–accent2); }
.stat.green .stat-val { color: var(–green); }
.stat.yellow .stat-val { color: var(–yellow); }
.stat.purple .stat-val { color: var(–purple); }

/* TOOLBAR */
.toolbar {
padding: 16px 24px;
display: flex;
gap: 10px;
align-items: center;
flex-wrap: wrap;
border-bottom: 1px solid var(–border);
background: var(–surface);
}

.tabs {
display: flex;
gap: 4px;
background: var(–bg);
padding: 4px;
border-radius: 8px;
}
.tab {
padding: 6px 16px;
border: none;
background: transparent;
color: var(–muted);
font-family: ‘Syne’, sans-serif;
font-size: .8rem;
font-weight: 600;
cursor: pointer;
border-radius: 6px;
transition: all .2s;
letter-spacing: .03em;
}
.tab.active {
background: var(–accent);
color: #fff;
}

.search-box {
flex: 1;
min-width: 160px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
padding: 7px 14px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: .82rem;
outline: none;
transition: border .2s;
}
.search-box:focus { border-color: var(–accent); }
.search-box::placeholder { color: var(–muted); }

.btn {
padding: 7px 16px;
border: none;
border-radius: 8px;
cursor: pointer;
font-family: ‘Syne’, sans-serif;
font-size: .8rem;
font-weight: 700;
transition: all .18s;
letter-spacing: .03em;
}
.btn-primary { background: var(–accent); color: #fff; }
.btn-primary:hover { background: #ea6c08; }
.btn-secondary { background: var(–surface2); color: var(–text); border: 1px solid var(–border); }
.btn-secondary:hover { border-color: var(–accent); color: var(–accent); }
.btn-sm { padding: 4px 10px; font-size: .72rem; border-radius: 6px; }
.btn-ghost { background: transparent; color: var(–muted); border: 1px solid var(–border); }
.btn-ghost:hover { color: var(–text); border-color: var(–muted); }

/* GRID */
.grid {
padding: 24px;
display: grid;
grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
gap: 16px;
}

/* CARD */
.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
overflow: hidden;
transition: border-color .2s, transform .15s;
position: relative;
}
.card:hover { border-color: #3a4060; transform: translateY(-1px); }

.card-accent-bar {
height: 3px;
width: 100%;
}

.card-body { padding: 16px; }

.card-header {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: 10px;
}

.card-num {
font-family: ‘DM Mono’, monospace;
font-size: .7rem;
color: var(–muted);
letter-spacing: .08em;
}

.card-title {
font-size: .95rem;
font-weight: 700;
color: var(–text);
margin: 4px 0 2px;
line-height: 1.3;
}

.card-desc {
font-size: .78rem;
color: var(–muted);
line-height: 1.4;
margin-bottom: 10px;
}

.card-meta {
display: flex;
gap: 12px;
flex-wrap: wrap;
margin-bottom: 12px;
}
.meta-item {
display: flex;
align-items: center;
gap: 4px;
font-size: .72rem;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
}
.meta-item strong { color: var(–text); }

.amounts {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 8px;
margin-bottom: 12px;
padding: 10px;
background: var(–surface2);
border-radius: 8px;
}
.amount-item { text-align: center; }
.amount-label { font-size: .6rem; color: var(–muted); text-transform: uppercase; letter-spacing: .06em; }
.amount-val { font-family: ‘DM Mono’, monospace; font-size: .9rem; font-weight: 500; color: var(–text); }
.amount-val.total { color: var(–accent); font-size: 1rem; }

.card-states {
display: flex;
gap: 8px;
align-items: center;
flex-wrap: wrap;
margin-bottom: 12px;
}

.badge {
padding: 3px 10px;
border-radius: 20px;
font-size: .65rem;
font-weight: 700;
letter-spacing: .06em;
text-transform: uppercase;
}
.badge-pendiente { background: rgba(234,179,8,.15); color: var(–yellow); border: 1px solid rgba(234,179,8,.3); }
.badge-aceptado { background: rgba(34,197,94,.15); color: var(–green); border: 1px solid rgba(34,197,94,.3); }
.badge-rechazado { background: rgba(239,68,68,.15); color: var(–red); border: 1px solid rgba(239,68,68,.3); }
.badge-en-curso { background: rgba(59,130,246,.15); color: var(–accent2); border: 1px solid rgba(59,130,246,.3); }
.badge-terminado { background: rgba(168,85,247,.15); color: var(–purple); border: 1px solid rgba(168,85,247,.3); }

.card-actions {
display: flex;
gap: 6px;
flex-wrap: wrap;
align-items: center;
}

/* Botón pulsante Contable */
.btn-contable {
background: linear-gradient(135deg, #a855f7, #7c3aed);
color: #fff;
border: none;
padding: 6px 14px;
border-radius: 8px;
font-family: ‘Syne’, sans-serif;
font-size: .75rem;
font-weight: 700;
cursor: pointer;
animation: pulse-contable 2s infinite;
display: flex;
align-items: center;
gap: 5px;
}
@keyframes pulse-contable {
0%, 100% { box-shadow: 0 0 0 0 rgba(168,85,247,.5); }
50% { box-shadow: 0 0 0 6px rgba(168,85,247,0); }
}

.btn-edit { background: var(–surface2); color: var(–muted); border: 1px solid var(–border); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: .7rem; transition: all .2s; }
.btn-edit:hover { color: var(–text); border-color: var(–muted); }
.btn-del { background: transparent; color: #ef4444; border: 1px solid rgba(239,68,68,.25); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: .7rem; transition: all .2s; }
.btn-del:hover { background: rgba(239,68,68,.1); }

/* MODAL */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,.75);
z-index: 200;
align-items: center;
justify-content: center;
backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 28px;
width: 100%;
max-width: 560px;
max-height: 90vh;
overflow-y: auto;
position: relative;
}
.modal h2 {
font-size: 1.1rem;
font-weight: 800;
margin-bottom: 20px;
display: flex;
align-items: center;
gap: 8px;
}
.modal-close {
position: absolute;
top: 18px; right: 18px;
background: var(–surface2);
border: 1px solid var(–border);
color: var(–muted);
width: 30px; height: 30px;
border-radius: 50%;
cursor: pointer;
font-size: .9rem;
display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(–text); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-full { grid-column: 1/-1; }

.field label {
display: block;
font-size: .7rem;
color: var(–muted);
text-transform: uppercase;
letter-spacing: .07em;
margin-bottom: 5px;
font-weight: 600;
}
.field input, .field textarea, .field select {
width: 100%;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
padding: 8px 12px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: .82rem;
outline: none;
transition: border .2s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(–accent); }
.field select option { background: var(–surface); }
.field textarea { resize: vertical; min-height: 60px; }

.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* CONTABLE MODAL */
.contable-preview {
background: var(–bg);
border: 1px solid var(–border);
border-radius: 10px;
padding: 14px;
margin: 16px 0;
}
.contable-row {
display: flex;
justify-content: space-between;
padding: 6px 0;
border-bottom: 1px solid var(–border);
font-size: .82rem;
}
.contable-row:last-child { border-bottom: none; }
.contable-row span:first-child { color: var(–muted); }
.contable-row span:last-child { font-family: ‘DM Mono’, monospace; color: var(–text); }
.contable-row.highlight span:last-child { color: var(–accent); font-weight: 500; }

/* EMPTY */
.empty {
text-align: center;
padding: 60px 20px;
color: var(–muted);
grid-column: 1/-1;
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty p { font-size: .85rem; }

/* TOAST */
.toast {
position: fixed;
bottom: 24px;
right: 24px;
background: var(–green);
color: #fff;
padding: 10px 20px;
border-radius: 8px;
font-size: .82rem;
font-weight: 700;
z-index: 999;
transform: translateY(80px);
opacity: 0;
transition: all .3s;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { background: var(–red); }

/* ACCENTBAR COLORS */
.accent-pendiente { background: var(–yellow); }
.accent-aceptado { background: var(–green); }
.accent-rechazado { background: var(–red); }

@media (max-width: 600px) {
.stats-bar { grid-template-columns: repeat(3, 1fr); }
.form-grid { grid-template-columns: 1fr; }
.grid { padding: 12px; }
.toolbar { padding: 10px 12px; }
}
</style>

</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    HAROSAT <span>Presupuestos & Trabajos</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openNew()">+ Nuevo presupuesto</button>
    <button class="btn btn-secondary btn-sm" onclick="exportCSV()">⬇ CSV</button>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat orange"><span class="stat-val" id="s-total">0</span><span class="stat-label">Total</span></div>
  <div class="stat yellow"><span class="stat-val" id="s-pend">0</span><span class="stat-label">Pendientes</span></div>
  <div class="stat blue"><span class="stat-val" id="s-curso">0</span><span class="stat-label">En curso</span></div>
  <div class="stat green"><span class="stat-val" id="s-acept">0</span><span class="stat-label">Aceptados</span></div>
  <div class="stat purple"><span class="stat-val" id="s-fact">0 €</span><span class="stat-label">Facturado</span></div>
</div>

<div class="toolbar">
  <div class="tabs">
    <button class="tab active" onclick="setTab('todos',this)">Todos</button>
    <button class="tab" onclick="setTab('presupuestos',this)">Presupuestos</button>
    <button class="tab" onclick="setTab('trabajos',this)">Trabajos</button>
    <button class="tab" onclick="setTab('terminados',this)">Terminados</button>
  </div>
  <input class="search-box" id="searchInput" placeholder="Buscar cliente, número…" oninput="renderCards()">
</div>

<div class="grid" id="cardsGrid"></div>

<!-- MODAL NUEVO/EDITAR -->

<div class="modal-overlay" id="modalForm">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalForm')">✕</button>
    <h2 id="modalTitle">📋 Nuevo Presupuesto</h2>
    <div class="form-grid">
      <div class="field">
        <label>Nº Presupuesto</label>
        <input id="f-num" placeholder="HS/26/24" />
      </div>
      <div class="field">
        <label>Fecha Presupuesto</label>
        <input id="f-fecha" type="date" />
      </div>
      <div class="field form-full">
        <label>Cliente</label>
        <input id="f-cliente" placeholder="Nombre del cliente" />
      </div>
      <div class="field form-full">
        <label>Descripción del trabajo</label>
        <textarea id="f-desc" placeholder="Descripción breve del trabajo…"></textarea>
      </div>
      <div class="field">
        <label>Base imponible (€)</label>
        <input id="f-base" type="number" step="0.01" placeholder="0.00" oninput="calcFromBase()" />
      </div>
      <div class="field">
        <label>Total con IVA 21% (€)</label>
        <input id="f-total" type="number" step="0.01" placeholder="0.00" oninput="calcFromTotal()" />
      </div>
      <div class="field">
        <label>Fecha trabajo</label>
        <input id="f-fecha-trabajo" type="date" />
      </div>
      <div class="field">
        <label>Técnico</label>
        <select id="f-tecnico">
          <option value="Jesús">Jesús</option>
          <option value="Técnico 2">Técnico 2</option>
          <option value="Técnico 3">Técnico 3</option>
          <option value="Técnico 4">Técnico 4</option>
          <option value="Técnico 5">Técnico 5</option>
        </select>
      </div>
      <div class="field">
        <label>Estado presupuesto</label>
        <select id="f-est-pres">
          <option value="Pendiente">Pendiente</option>
          <option value="Aceptado">Aceptado</option>
          <option value="Rechazado">Rechazado</option>
        </select>
      </div>
      <div class="field">
        <label>Estado trabajo</label>
        <select id="f-est-trab">
          <option value="Pendiente">Pendiente</option>
          <option value="En curso">En curso</option>
          <option value="Terminado">Terminado</option>
        </select>
      </div>
      <div class="field">
        <label>Forma de pago</label>
        <select id="f-pago">
          <option value="Transferencia">Transferencia</option>
          <option value="Efectivo">Efectivo</option>
          <option value="Tarjeta">Tarjeta</option>
        </select>
      </div>
      <div class="field form-full">
        <label>Notas</label>
        <textarea id="f-notas" placeholder="Notas internas…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalForm')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRecord()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL CONTABLE -->

<div class="modal-overlay" id="modalContable">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalContable')">✕</button>
    <h2>📊 Registrar en Contable</h2>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:8px;">Revisa los datos antes de insertar el ingreso en <strong style="color:var(--text)">conta_ingresos</strong>.</p>
    <div class="contable-preview" id="contablePreview"></div>
    <div class="form-grid" style="margin-top:12px;">
      <div class="field">
        <label>Forma de pago</label>
        <select id="cc-pago">
          <option value="Transferencia">Transferencia</option>
          <option value="Efectivo">Efectivo</option>
          <option value="Tarjeta">Tarjeta</option>
        </select>
      </div>
      <div class="field">
        <label>Fecha cobro</label>
        <input id="cc-fecha" type="date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalContable')">Cancelar</button>
      <button class="btn btn-primary" id="btnInsertContable" onclick="insertContable()">✓ Insertar ingreso</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://sobiyfyzalynxcpfoldc.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvYmlmZnl6YWx5bnhjcGZvbGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk4MjI4NzMsImV4cCI6MjAyNTM5ODg3M30.wEMnFVFBKDIRMXpMZqS5Bq5dpI8UhBf-P_k37Yv0KoI';

const H = { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Prefer': 'return=representation' };

// ── STATE ───────────────────────────────────────────────────────────────────
let records = [];
let currentTab = 'todos';
let editingId = null;
let contableRecord = null;

// ── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  await ensureTable();
  await loadRecords();
}

async function ensureTable() {
  // Just try to select; if it fails the table doesn't exist yet
  const r = await fetch(`${SUPA_URL}/rest/v1/presupuestos?limit=1`, { headers: H });
  if (!r.ok) {
    showToast('La tabla "presupuestos" no existe en Supabase. Créala primero.', true);
  }
}

async function loadRecords() {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/presupuestos?select=*`, { headers: H });
    if (!r.ok) throw new Error();
    records = await r.json();
    // Sort client-side by id desc
    records.sort((a,b) => b.id - a.id);
    updateStats();
    renderCards();
  } catch(e) {
    showToast('Error cargando datos', true);
  }
}

// ── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-total').textContent = records.length;
  document.getElementById('s-pend').textContent = records.filter(r=>r.estado_presupuesto==='Pendiente').length;
  document.getElementById('s-curso').textContent = records.filter(r=>r.estado_trabajo==='En curso').length;
  document.getElementById('s-acept').textContent = records.filter(r=>r.estado_presupuesto==='Aceptado').length;
  const fact = records.filter(r=>r.estado_trabajo==='Terminado').reduce((a,b)=>a+(b.importe_total||0),0);
  document.getElementById('s-fact').textContent = fmt(fact) + ' €';
}

function fmt(n) { return Number(n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) { if(!d) return '—'; const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }

// ── TABS & FILTER ────────────────────────────────────────────────────────────
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function filterRecords() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return records.filter(r => {
    const matchTab =
      currentTab === 'todos' ? true :
      currentTab === 'presupuestos' ? r.estado_presupuesto !== 'Aceptado' :
      currentTab === 'trabajos' ? r.estado_presupuesto === 'Aceptado' && r.estado_trabajo !== 'Terminado' :
      currentTab === 'terminados' ? r.estado_trabajo === 'Terminado' : true;
    const matchQ = !q || (r.numero_presupuesto||'').toLowerCase().includes(q) || (r.cliente||'').toLowerCase().includes(q) || (r.descripcion||'').toLowerCase().includes(q);
    return matchTab && matchQ;
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const list = filterRecords();
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📂</div><p>Sin registros en esta vista</p></div>`;
    return;
  }
  grid.innerHTML = list.map(r => cardHTML(r)).join('');
}

function badgeClass(val) {
  const m = { 'Pendiente':'pendiente','Aceptado':'aceptado','Rechazado':'rechazado','En curso':'en-curso','Terminado':'terminado' };
  return 'badge badge-' + (m[val]||'pendiente');
}
function accentClass(ep) {
  const m = {'Pendiente':'accent-pendiente','Aceptado':'accent-aceptado','Rechazado':'accent-rechazado'};
  return m[ep]||'accent-pendiente';
}

function cardHTML(r) {
  const ep = r.estado_presupuesto || 'Pendiente';
  const et = r.estado_trabajo || 'Pendiente';
  const isAceptado = ep === 'Aceptado';
  const isTerminado = et === 'Terminado';

  const stateButtons = ep === 'Pendiente' ? `
    <button class="btn btn-sm" style="background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);" onclick="changeEstPres(${r.id},'Aceptado')">✓ Aceptar</button>
    <button class="btn btn-sm" style="background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25);" onclick="changeEstPres(${r.id},'Rechazado')">✗ Rechazar</button>
  ` : ep === 'Aceptado' ? `
    ${et === 'Pendiente' ? `<button class="btn btn-sm" style="background:rgba(59,130,246,.15);color:var(--accent2);border:1px solid rgba(59,130,246,.3);" onclick="changeEstTrab(${r.id},'En curso')">▶ En curso</button>` : ''}
    ${et === 'En curso' ? `<button class="btn btn-sm" style="background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3);" onclick="changeEstTrab(${r.id},'Terminado')">✓ Terminado</button>` : ''}
    ${isTerminado ? `<button class="btn-contable" onclick="openContable(${r.id})">📊 → Contable</button>` : ''}
  ` : '';

  return `
  <div class="card" id="card-${r.id}">
    <div class="card-accent-bar ${accentClass(ep)}"></div>
    <div class="card-body">
      <div class="card-header">
        <div>
          <div class="card-num">${r.numero_presupuesto||'—'} · ${fmtDate(r.fecha_presupuesto)}</div>
          <div class="card-title">${r.cliente||'Sin cliente'}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">
          <span class="${badgeClass(ep)}">${ep}</span>
          ${isAceptado ? `<span class="${badgeClass(et)}">${et}</span>` : ''}
        </div>
      </div>
      <div class="card-desc">${r.descripcion||'—'}</div>
      <div class="amounts">
        <div class="amount-item">
          <div class="amount-label">Base</div>
          <div class="amount-val">${fmt(r.importe_base)} €</div>
        </div>
        <div class="amount-item">
          <div class="amount-label">IVA 21%</div>
          <div class="amount-val">${fmt((r.importe_total||0)-(r.importe_base||0))} €</div>
        </div>
        <div class="amount-item">
          <div class="amount-label">Total</div>
          <div class="amount-val total">${fmt(r.importe_total)} €</div>
        </div>
      </div>
      <div class="card-meta">
        ${r.tecnico ? `<div class="meta-item">👤 <strong>${r.tecnico}</strong></div>` : ''}
        ${r.fecha_trabajo ? `<div class="meta-item">🔧 <strong>${fmtDate(r.fecha_trabajo)}</strong></div>` : ''}
        ${r.forma_pago ? `<div class="meta-item">💳 <strong>${r.forma_pago}</strong></div>` : ''}
      </div>
      ${r.notas ? `<div class="card-desc" style="font-style:italic;margin-bottom:10px;">📝 ${r.notas}</div>` : ''}
      <div class="card-actions">
        ${stateButtons}
        <button class="btn-edit" onclick="openEdit(${r.id})">✏ Editar</button>
        <button class="btn-del" onclick="deleteRecord(${r.id})">🗑</button>
      </div>
    </div>
  </div>`;
}

// ── CALC ─────────────────────────────────────────────────────────────────────
function calcFromBase() {
  const b = parseFloat(document.getElementById('f-base').value)||0;
  document.getElementById('f-total').value = b > 0 ? (b * 1.21).toFixed(2) : '';
}
function calcFromTotal() {
  const t = parseFloat(document.getElementById('f-total').value)||0;
  document.getElementById('f-base').value = t > 0 ? (t / 1.21).toFixed(2) : '';
}

// ── FORM ─────────────────────────────────────────────────────────────────────
function openNew() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '📋 Nuevo Presupuesto';
  clearForm();
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
  openModal('modalForm');
}

function openEdit(id) {
  editingId = id;
  const r = records.find(x=>x.id===id);
  if (!r) return;
  document.getElementById('modalTitle').textContent = '✏ Editar Presupuesto';
  document.getElementById('f-num').value = r.numero_presupuesto||'';
  document.getElementById('f-cliente').value = r.cliente||'';
  document.getElementById('f-desc').value = r.descripcion||'';
  document.getElementById('f-base').value = r.importe_base||'';
  document.getElementById('f-total').value = r.importe_total||'';
  document.getElementById('f-fecha').value = r.fecha_presupuesto||'';
  document.getElementById('f-fecha-trabajo').value = r.fecha_trabajo||'';
  document.getElementById('f-tecnico').value = r.tecnico||'Jesús';
  document.getElementById('f-est-pres').value = r.estado_presupuesto||'Pendiente';
  document.getElementById('f-est-trab').value = r.estado_trabajo||'Pendiente';
  document.getElementById('f-pago').value = r.forma_pago||'Transferencia';
  document.getElementById('f-notas').value = r.notas||'';
  openModal('modalForm');
}

function clearForm() {
  ['f-num','f-cliente','f-desc','f-base','f-total','f-fecha','f-fecha-trabajo','f-notas'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-tecnico').value='Jesús';
  document.getElementById('f-est-pres').value='Pendiente';
  document.getElementById('f-est-trab').value='Pendiente';
  document.getElementById('f-pago').value='Transferencia';
}

async function saveRecord() {
  const base = parseFloat(document.getElementById('f-base').value)||0;
  const total = parseFloat(document.getElementById('f-total').value)||0;
  const body = {
    numero_presupuesto: document.getElementById('f-num').value.trim(),
    cliente: document.getElementById('f-cliente').value.trim(),
    descripcion: document.getElementById('f-desc').value.trim(),
    importe_base: base,
    importe_total: total,
    fecha_presupuesto: document.getElementById('f-fecha').value||null,
    fecha_trabajo: document.getElementById('f-fecha-trabajo').value||null,
    tecnico: document.getElementById('f-tecnico').value,
    estado_presupuesto: document.getElementById('f-est-pres').value,
    estado_trabajo: document.getElementById('f-est-trab').value,
    forma_pago: document.getElementById('f-pago').value,
    notas: document.getElementById('f-notas').value.trim(),
  };
  try {
    let r;
    if (editingId) {
      r = await fetch(`${SUPA_URL}/rest/v1/presupuestos?id=eq.${editingId}`, { method:'PATCH', headers:H, body:JSON.stringify(body) });
    } else {
      r = await fetch(`${SUPA_URL}/rest/v1/presupuestos`, { method:'POST', headers:H, body:JSON.stringify(body) });
    }
    if (!r.ok) throw new Error(await r.text());
    closeModal('modalForm');
    showToast(editingId ? 'Presupuesto actualizado' : 'Presupuesto creado');
    await loadRecords();
  } catch(e) {
    showToast('Error al guardar: ' + e.message, true);
  }
}

// ── ESTADO RÁPIDO ────────────────────────────────────────────────────────────
async function changeEstPres(id, val) {
  await patchRecord(id, { estado_presupuesto: val });
}
async function changeEstTrab(id, val) {
  await patchRecord(id, { estado_trabajo: val });
}
async function patchRecord(id, data) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/presupuestos?id=eq.${id}`, { method:'PATCH', headers:H, body:JSON.stringify(data) });
    if (!r.ok) throw new Error();
    showToast('Estado actualizado');
    await loadRecords();
  } catch { showToast('Error al actualizar', true); }
}

// ── DELETE ───────────────────────────────────────────────────────────────────
async function deleteRecord(id) {
  if (!confirm('¿Eliminar este presupuesto?')) return;
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/presupuestos?id=eq.${id}`, { method:'DELETE', headers:H });
    if (!r.ok) throw new Error();
    showToast('Eliminado');
    await loadRecords();
  } catch { showToast('Error al eliminar', true); }
}

// ── CONTABLE ─────────────────────────────────────────────────────────────────
function openContable(id) {
  contableRecord = records.find(r=>r.id===id);
  if (!contableRecord) return;
  const r = contableRecord;
  const iva = (r.importe_total||0) - (r.importe_base||0);
  document.getElementById('contablePreview').innerHTML = `
    <div class="contable-row"><span>Concepto</span><span>${r.descripcion||r.numero_presupuesto||'—'}</span></div>
    <div class="contable-row"><span>Cliente</span><span>${r.cliente||'—'}</span></div>
    <div class="contable-row"><span>Nº Presupuesto</span><span>${r.numero_presupuesto||'—'}</span></div>
    <div class="contable-row"><span>Base imponible</span><span>${fmt(r.importe_base)} €</span></div>
    <div class="contable-row"><span>IVA (21%)</span><span>${fmt(iva)} €</span></div>
    <div class="contable-row highlight"><span>Total</span><span>${fmt(r.importe_total)} €</span></div>
  `;
  document.getElementById('cc-pago').value = r.forma_pago||'Transferencia';
  document.getElementById('cc-fecha').value = new Date().toISOString().split('T')[0];
  openModal('modalContable');
}

async function insertContable() {
  const r = contableRecord;
  const btn = document.getElementById('btnInsertContable');
  btn.disabled = true; btn.textContent = 'Insertando…';
  const body = {
    concepto: (r.descripcion||r.numero_presupuesto||'Trabajo') + ' · ' + (r.cliente||''),
    base_imponible: r.importe_base||0,
    tipo_iva: 21,
    cuota_iva: parseFloat(((r.importe_total||0)-(r.importe_base||0)).toFixed(2)),
    total: r.importe_total||0,
    forma_pago: document.getElementById('cc-pago').value,
    fecha: document.getElementById('cc-fecha').value,
    cliente: r.cliente||'',
    numero_factura: r.numero_presupuesto||'',
    categoria: 'Trabajos'
  };
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/conta_ingresos`, { method:'POST', headers:H, body:JSON.stringify(body) });
    if (!res.ok) throw new Error(await res.text());
    closeModal('modalContable');
    showToast('✓ Ingreso registrado en Contable');
  } catch(e) {
    showToast('Error: ' + e.message, true);
  }
  btn.disabled = false; btn.textContent = '✓ Insertar ingreso';
}

// ── EXPORT CSV ───────────────────────────────────────────────────────────────
function exportCSV() {
  const list = filterRecords();
  const cols = ['numero_presupuesto','cliente','descripcion','importe_base','importe_total','fecha_presupuesto','fecha_trabajo','tecnico','estado_presupuesto','estado_trabajo','forma_pago','notas'];
  const header = cols.join(';');
  const rows = list.map(r => cols.map(c => `"${(r[c]||'').toString().replace(/"/g,'""')}"`).join(';'));
  const csv = [header,...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'harosat_presupuestos.csv';
  a.click();
}

// ── MODAL UTILS ───────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err?' error':'') + ' show';
  setTimeout(()=>t.className='toast',3000);
}
