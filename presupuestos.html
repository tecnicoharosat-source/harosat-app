<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAROSAT · Presupuestos</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HAROSAT Presupuestos">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f;
  --surface: #0e1118;
  --surface2: #141825;
  --surface3: #1a2030;
  --border: #1e2540;
  --border2: #2a3355;
  --accent: #ff6b2b;
  --accent2: #3b7ff5;
  --accent3: #00c9a7;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --purple: #a855f7;
  --text: #e8edf8;
  --text2: #9aa5c0;
  --muted: #5a6480;
  --card: #0d1120;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overscroll-behavior:none;}

/* HEADER */
header{
background:var(–surface);
border-bottom:1px solid var(–border);
padding:0 20px;
height:58px;
display:flex;align-items:center;justify-content:space-between;
position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:8px;font-weight:900;font-size:1rem;letter-spacing:.04em;}
.logo-icon{width:28px;height:28px;background:var(–accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;color:#fff;}
.logo-sub{font-size:.7rem;font-weight:400;color:var(–muted);letter-spacing:.06em;margin-left:2px;}

.hdr-right{display:flex;gap:8px;align-items:center;}
.badge-year{background:var(–surface3);border:1px solid var(–border2);border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:700;color:var(–text2);letter-spacing:.06em;}

/* STATS */
.stats{
display:grid;grid-template-columns:repeat(4,1fr);
background:var(–surface);
border-bottom:1px solid var(–border);
}
.stat{
padding:12px 16px;
border-right:1px solid var(–border);
display:flex;flex-direction:column;gap:2px;
}
.stat:last-child{border-right:none;}
.stat-n{font-family:‘JetBrains Mono’,monospace;font-size:1.5rem;font-weight:600;}
.stat-l{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(–muted);}
.c-o .stat-n{color:var(–accent);}
.c-b .stat-n{color:var(–accent2);}
.c-g .stat-n{color:var(–green);}
.c-y .stat-n{color:var(–yellow);}

/* TOOLBAR */
.toolbar{
padding:12px 16px;
display:flex;gap:8px;align-items:center;flex-wrap:wrap;
background:var(–surface);
border-bottom:1px solid var(–border);
}
.tabs{display:flex;gap:2px;background:var(–bg);padding:3px;border-radius:8px;}
.tab{
padding:5px 12px;border:none;background:transparent;
color:var(–muted);font-family:‘Outfit’,sans-serif;
font-size:.73rem;font-weight:600;cursor:pointer;border-radius:6px;
transition:all .2s;letter-spacing:.03em;white-space:nowrap;
}
.tab.active{background:var(–accent);color:#fff;}
.search{
flex:1;min-width:140px;
background:var(–bg);border:1px solid var(–border);border-radius:8px;
padding:6px 12px;color:var(–text);font-family:‘JetBrains Mono’,monospace;
font-size:.78rem;outline:none;transition:border .2s;
}
.search:focus{border-color:var(–accent);}
.search::placeholder{color:var(–muted);}

.btn{
padding:6px 14px;border:none;border-radius:8px;cursor:pointer;
font-family:‘Outfit’,sans-serif;font-size:.78rem;font-weight:700;
transition:all .18s;letter-spacing:.03em;display:inline-flex;align-items:center;gap:5px;
}
.btn-primary{background:var(–accent);color:#fff;}
.btn-primary:hover{background:#e55a1e;}
.btn-secondary{background:var(–surface3);color:var(–text2);border:1px solid var(–border2);}
.btn-secondary:hover{border-color:var(–accent);color:var(–accent);}
.btn-sm{padding:4px 10px;font-size:.7rem;border-radius:6px;}
.btn-ghost{background:transparent;color:var(–muted);border:1px solid var(–border);}
.btn-ghost:hover{color:var(–text);border-color:var(–muted);}

/* GRID */
.grid{padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}

/* CARD */
.card{
background:var(–card);border:1px solid var(–border);border-radius:12px;
overflow:hidden;transition:border-color .2s,transform .15s;
}
.card:hover{border-color:var(–border2);transform:translateY(-1px);}
.card-bar{height:3px;}
.bar-caldera{background:linear-gradient(90deg,var(–accent),#ff9a6b);}
.bar-bomba{background:linear-gradient(90deg,var(–accent2),#6fb3ff);}
.bar-otro{background:linear-gradient(90deg,var(–accent3),#6effd8);}

.card-body{padding:14px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-num{font-family:‘JetBrains Mono’,monospace;font-size:.68rem;color:var(–muted);letter-spacing:.08em;}
.card-title{font-size:.92rem;font-weight:700;margin:3px 0 2px;line-height:1.3;}
.card-type{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;}
.type-caldera{background:rgba(255,107,43,.15);color:var(–accent);}
.type-bomba{background:rgba(59,127,245,.15);color:var(–accent2);}
.type-otro{background:rgba(0,201,167,.15);color:var(–accent3);}

.card-desc{font-size:.76rem;color:var(–text2);line-height:1.4;margin-bottom:10px;}

.amounts{
display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
padding:10px;background:var(–surface2);border-radius:8px;margin-bottom:10px;
}
.amt{text-align:center;}
.amt-l{font-size:.58rem;color:var(–muted);text-transform:uppercase;letter-spacing:.06em;}
.amt-v{font-family:‘JetBrains Mono’,monospace;font-size:.85rem;font-weight:500;color:var(–text);}
.amt-v.total{color:var(–accent);font-size:.95rem;}

.card-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.meta{display:flex;align-items:center;gap:3px;font-size:.68rem;color:var(–text2);font-family:‘JetBrains Mono’,monospace;}
.meta strong{color:var(–text);}

.badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.badge{padding:3px 9px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.b-pend{background:rgba(245,158,11,.13);color:var(–yellow);border:1px solid rgba(245,158,11,.28);}
.b-acept{background:rgba(34,197,94,.13);color:var(–green);border:1px solid rgba(34,197,94,.28);}
.b-rechaz{background:rgba(239,68,68,.13);color:var(–red);border:1px solid rgba(239,68,68,.28);}
.b-curso{background:rgba(59,127,245,.13);color:var(–accent2);border:1px solid rgba(59,127,245,.28);}
.b-term{background:rgba(168,85,247,.13);color:var(–purple);border:1px solid rgba(168,85,247,.28);}

.card-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.btn-acept{background:rgba(34,197,94,.13);color:var(–green);border:1px solid rgba(34,197,94,.28);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.68rem;font-family:‘Outfit’,sans-serif;font-weight:700;transition:all .2s;}
.btn-rechaz{background:rgba(239,68,68,.1);color:var(–red);border:1px solid rgba(239,68,68,.25);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.68rem;font-family:‘Outfit’,sans-serif;font-weight:700;transition:all .2s;}
.btn-curso{background:rgba(59,127,245,.13);color:var(–accent2);border:1px solid rgba(59,127,245,.28);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.68rem;font-family:‘Outfit’,sans-serif;font-weight:700;transition:all .2s;}
.btn-term{background:rgba(168,85,247,.13);color:var(–purple);border:1px solid rgba(168,85,247,.28);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.68rem;font-family:‘Outfit’,sans-serif;font-weight:700;transition:all .2s;}
.btn-share{background:rgba(0,201,167,.13);color:var(–accent3);border:1px solid rgba(0,201,167,.28);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.68rem;font-family:‘Outfit’,sans-serif;font-weight:700;transition:all .2s;}
.btn-edit-c{background:var(–surface3);color:var(–text2);border:1px solid var(–border2);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.68rem;transition:all .2s;}
.btn-edit-c:hover{color:var(–text);border-color:var(–muted);}
.btn-del-c{background:transparent;color:var(–red);border:1px solid rgba(239,68,68,.25);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.68rem;transition:all .2s;}
.btn-del-c:hover{background:rgba(239,68,68,.1);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{
background:var(–surface);border:1px solid var(–border2);border-radius:16px;
padding:24px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;position:relative;
}
.modal h2{font-size:1rem;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.modal-x{
position:absolute;top:16px;right:16px;background:var(–surface3);border:1px solid var(–border);
color:var(–muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;
display:flex;align-items:center;justify-content:center;
}
.modal-x:hover{color:var(–text);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ffw{grid-column:1/-1;}
.field label{display:block;font-size:.67rem;color:var(–muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;font-weight:600;}
.field input,.field textarea,.field select{
width:100%;background:var(–bg);border:1px solid var(–border);border-radius:8px;
padding:7px 11px;color:var(–text);font-family:‘JetBrains Mono’,monospace;font-size:.8rem;
outline:none;transition:border .2s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(–accent);}
.field select option{background:var(–surface);}
.field textarea{resize:vertical;min-height:56px;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* SHARE MODAL */
.share-opts{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.share-btn{
display:flex;align-items:center;gap:12px;padding:12px 16px;
background:var(–surface2);border:1px solid var(–border2);border-radius:10px;
cursor:pointer;font-size:.85rem;font-weight:600;color:var(–text);
transition:all .2s;text-decoration:none;
}
.share-btn:hover{border-color:var(–accent);color:var(–accent);}
.share-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.si-wa{background:#25D366;}
.si-gmail{background:#EA4335;}
.si-copy{background:var(–surface3);}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(–muted);grid-column:1/-1;}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
.empty p{font-size:.82rem;}

/* TOAST */
.toast{
position:fixed;bottom:20px;right:20px;
background:var(–green);color:#fff;
padding:10px 18px;border-radius:8px;font-size:.8rem;font-weight:700;
z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.err{background:var(–red);}

/* FAB */
.fab{
position:fixed;bottom:24px;right:24px;
width:52px;height:52px;border-radius:50%;
background:var(–accent);border:none;cursor:pointer;
display:flex;align-items:center;justify-content:center;
font-size:1.4rem;color:#fff;box-shadow:0 4px 20px rgba(255,107,43,.4);
transition:all .2s;z-index:90;
}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(255,107,43,.6);}

@media(max-width:600px){
.stats{grid-template-columns:repeat(2,1fr);}
.fg{grid-template-columns:1fr;}
.grid{padding:10px;grid-template-columns:1fr;}
.toolbar{padding:8px 12px;}
}
</style>

</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">H</div>
    HAROSAT <span class="logo-sub">· PRESUPUESTOS</span>
  </div>
  <div class="hdr-right">
    <span class="badge-year" id="yearBadge">2026</span>
    <button class="btn btn-secondary btn-sm" onclick="exportCSV()">⬇ CSV</button>
  </div>
</header>

<div class="stats">
  <div class="stat c-o"><span class="stat-n" id="s-total">0</span><span class="stat-l">Total año</span></div>
  <div class="stat c-b"><span class="stat-n" id="s-pend">0</span><span class="stat-l">Pendientes</span></div>
  <div class="stat c-g"><span class="stat-n" id="s-acept">0</span><span class="stat-l">Aceptados</span></div>
  <div class="stat c-y"><span class="stat-n" id="s-fact">0€</span><span class="stat-l">Facturado</span></div>
</div>

<div class="toolbar">
  <div class="tabs">
    <button class="tab active" onclick="setTab('todos',this)">Todos</button>
    <button class="tab" onclick="setTab('pendientes',this)">Pendientes</button>
    <button class="tab" onclick="setTab('aceptados',this)">Aceptados</button>
    <button class="tab" onclick="setTab('terminados',this)">Terminados</button>
  </div>
  <input class="search" id="searchInput" placeholder="Buscar cliente, número…" oninput="renderCards()">
</div>

<div class="grid" id="cardsGrid"></div>
<button class="fab" onclick="openNew()">＋</button>

<!-- MODAL FORM -->

<div class="overlay" id="modalForm">
  <div class="modal">
    <button class="modal-x" onclick="closeM('modalForm')">✕</button>
    <h2 id="mTitle">📋 Nuevo Presupuesto</h2>
    <div class="fg">
      <div class="field">
        <label>Nº Presupuesto</label>
        <input id="f-num" readonly style="opacity:.7;cursor:default;" />
      </div>
      <div class="field">
        <label>Fecha</label>
        <input id="f-fecha" type="date" />
      </div>
      <div class="field ffw">
        <label>Cliente</label>
        <input id="f-cliente" placeholder="Nombre del cliente" />
      </div>
      <div class="field ffw">
        <label>Tipo de presupuesto</label>
        <select id="f-tipo" onchange="onTipoChange()">
          <option value="Caldera">🔥 Cambio de caldera</option>
          <option value="Bomba">❄️ Bomba calor Samsung Windfree</option>
          <option value="Otro">🔧 Otro trabajo</option>
        </select>
      </div>
      <div class="field ffw">
        <label>Descripción del trabajo</label>
        <textarea id="f-desc" rows="3"></textarea>
      </div>
      <div class="field">
        <label>Base imponible (€)</label>
        <input id="f-base" type="number" step="0.01" placeholder="0.00" oninput="calcBase()" />
      </div>
      <div class="field">
        <label>Total con IVA 21% (€)</label>
        <input id="f-total" type="number" step="0.01" placeholder="0.00" oninput="calcTotal()" />
      </div>
      <div class="field">
        <label>Fecha trabajo</label>
        <input id="f-fechatrab" type="date" />
      </div>
      <div class="field">
        <label>Técnico</label>
        <select id="f-tecnico">
          <option value="Jesús">Jesús</option>
          <option value="Igor">Igor</option>
          <option value="Ambos">Ambos</option>
        </select>
      </div>
      <div class="field">
        <label>Estado presupuesto</label>
        <select id="f-estpres">
          <option value="Pendiente">Pendiente</option>
          <option value="Aceptado">Aceptado</option>
          <option value="Rechazado">Rechazado</option>
        </select>
      </div>
      <div class="field">
        <label>Estado trabajo</label>
        <select id="f-esttrab">
          <option value="Pendiente">Pendiente</option>
          <option value="En curso">En curso</option>
          <option value="Terminado">Terminado</option>
        </select>
      </div>
      <div class="field">
        <label>Forma de pago</label>
        <select id="f-pago">
          <option value="Transferencia">Transferencia</option>
          <option value="Efectivo">Efectivo</option>
          <option value="Tarjeta">Tarjeta</option>
        </select>
      </div>
      <div class="field ffw">
        <label>Notas</label>
        <textarea id="f-notas" rows="2" placeholder="Notas internas…"></textarea>
      </div>
    </div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="closeM('modalForm')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRecord()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL SHARE -->

<div class="overlay" id="modalShare">
  <div class="modal" style="max-width:380px;">
    <button class="modal-x" onclick="closeM('modalShare')">✕</button>
    <h2>📤 Compartir presupuesto</h2>
    <p style="font-size:.78rem;color:var(--text2);margin-bottom:4px;">Presupuesto: <strong id="shareNum" style="color:var(--text);"></strong></p>
    <p style="font-size:.78rem;color:var(--text2);margin-bottom:16px;">Cliente: <strong id="shareCli" style="color:var(--text);"></strong></p>
    <div class="share-opts">
      <a id="btnWA" href="#" class="share-btn" target="_blank">
        <div class="share-icon si-wa">💬</div>
        <div><div style="font-weight:700;">WhatsApp</div><div style="font-size:.7rem;color:var(--text2);">Enviar resumen por WhatsApp</div></div>
      </a>
      <a id="btnGmail" href="#" class="share-btn" target="_blank">
        <div class="share-icon si-gmail">✉️</div>
        <div><div style="font-weight:700;">Gmail</div><div style="font-size:.7rem;color:var(--text2);">Enviar por correo electrónico</div></div>
      </a>
      <button class="share-btn" onclick="copyText()" id="btnCopy">
        <div class="share-icon si-copy">📋</div>
        <div><div style="font-weight:700;">Copiar texto</div><div style="font-size:.7rem;color:var(--text2);">Copiar resumen al portapapeles</div></div>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG SUPABASE ──────────────────────────────────────────────────────────
const SUPA_URL = 'https://sobiyfyzalynxcpfoldc.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvYmlmZnl6YWx5bnhjcGZvbGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk4MjI4NzMsImV4cCI6MjAyNTM5ODg3M30.wEMnFVFBKDIRMXpMZqS5Bq5dpI8UhBf-P_k37Yv0KoI';
const H = {
  'Content-Type':'application/json',
  'apikey':SUPA_KEY,
  'Authorization':'Bearer '+SUPA_KEY,
  'Prefer':'return=representation'
};
const TABLE = 'presupuestos';

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let records = [];
let currentTab = 'todos';
let editingId = null;
let shareRecord = null;
const YEAR = new Date().getFullYear();
const CONTADOR_START = 26; // siguiente número desde HS/26/26

// Descripciones predefinidas por tipo
const DESC_CALDERA = `Suministro e instalación de caldera de gas de condensación. Incluye: conexiones hidráulicas, adecuación tubo de gas a normativa, adecuación salida de humos, conexiones eléctricas, termostato, puesta en servicio y certificación.`;
const DESC_BOMBA = `Suministro e instalación de bomba de calor Samsung Windfree. Incluye: obra civil, conexiones eléctricas, tuberías de refrigerante, puesta en servicio y certificación.`;
const DESC_OTRO = '';

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('yearBadge').textContent = YEAR;
init();

async function init() {
  await loadRecords();
}

async function loadRecords() {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${TABLE}?select=*&order=id.desc`, { headers:H });
    if (!r.ok) throw new Error(await r.text());
    records = await r.json();
    updateStats();
    renderCards();
  } catch(e) {
    // Intentar crear tabla automáticamente no es posible desde REST API, mostrar error
    showToast('Error cargando datos. Verifica Supabase.', true);
    records = [];
    updateStats();
    renderCards();
  }
}

// ─── NÚMERO SIGUIENTE ─────────────────────────────────────────────────────────
function nextNum() {
  if (!records.length) return `HS/${String(YEAR).slice(-2)}/${CONTADOR_START}`;
  // Obtener todos los números del año actual
  const nums = records
    .map(r => r.numero_presupuesto || '')
    .filter(n => n.startsWith(`HS/${String(YEAR).slice(-2)}/`))
    .map(n => parseInt(n.split('/')[2]) || 0);
  const max = nums.length ? Math.max(...nums) : CONTADOR_START - 1;
  return `HS/${String(YEAR).slice(-2)}/${max + 1}`;
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const yr = String(YEAR).slice(-2);
  const thisYear = records.filter(r => (r.numero_presupuesto||'').includes(`/${yr}/`));
  document.getElementById('s-total').textContent = thisYear.length;
  document.getElementById('s-pend').textContent = thisYear.filter(r=>r.estado_presupuesto==='Pendiente').length;
  document.getElementById('s-acept').textContent = thisYear.filter(r=>r.estado_presupuesto==='Aceptado').length;
  const fact = thisYear.filter(r=>r.estado_trabajo==='Terminado').reduce((a,b)=>a+(parseFloat(b.importe_total)||0),0);
  document.getElementById('s-fact').textContent = fmt(fact)+'€';
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function filtered() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  return records.filter(r => {
    const mt =
      currentTab==='todos' ? true :
      currentTab==='pendientes' ? r.estado_presupuesto==='Pendiente' :
      currentTab==='aceptados' ? r.estado_presupuesto==='Aceptado' && r.estado_trabajo!=='Terminado' :
      currentTab==='terminados' ? r.estado_trabajo==='Terminado' : true;
    const mq = !q ||
      (r.numero_presupuesto||'').toLowerCase().includes(q) ||
      (r.cliente||'').toLowerCase().includes(q) ||
      (r.descripcion||'').toLowerCase().includes(q);
    return mt && mq;
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const list = filtered();
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📂</div><p>Sin registros en esta vista</p></div>`;
    return;
  }
  grid.innerHTML = list.map(cardHTML).join('');
}

function barClass(tipo) {
  return tipo==='Caldera'?'bar-caldera':tipo==='Bomba'?'bar-bomba':'bar-otro';
}
function typeClass(tipo) {
  return tipo==='Caldera'?'type-caldera':tipo==='Bomba'?'type-bomba':'type-otro';
}
function typeLabel(tipo) {
  return tipo==='Caldera'?'🔥 Caldera':tipo==='Bomba'?'❄️ Windfree':'🔧 Otro';
}
function badgeClass(v) {
  const m={'Pendiente':'b-pend','Aceptado':'b-acept','Rechazado':'b-rechaz','En curso':'b-curso','Terminado':'b-term'};
  return 'badge '+(m[v]||'b-pend');
}

function cardHTML(r) {
  const ep = r.estado_presupuesto||'Pendiente';
  const et = r.estado_trabajo||'Pendiente';
  const isAcept = ep==='Aceptado';
  const id = r.id;
  const iva = ((r.importe_total||0)-(r.importe_base||0));

  let stateBtn = '';
  if (ep==='Pendiente') {
    stateBtn = `<button class="btn-acept" onclick="chgPres(${id},'Aceptado')">✓ Aceptar</button>
                <button class="btn-rechaz" onclick="chgPres(${id},'Rechazado')">✗ Rechazar</button>`;
  } else if (isAcept) {
    if (et==='Pendiente') stateBtn = `<button class="btn-curso" onclick="chgTrab(${id},'En curso')">▶ En curso</button>`;
    if (et==='En curso') stateBtn = `<button class="btn-term" onclick="chgTrab(${id},'Terminado')">✓ Terminado</button>`;
  }

  return `<div class="card" id="card-${id}">
    <div class="card-bar ${barClass(r.tipo||'Caldera')}"></div>
    <div class="card-body">
      <div class="card-top">
        <div>
          <div class="card-num">${r.numero_presupuesto||'—'} · ${fmtDate(r.fecha_presupuesto)}</div>
          <div class="card-title">${r.cliente||'Sin cliente'}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end;">
          <span class="card-type ${typeClass(r.tipo||'Caldera')}">${typeLabel(r.tipo||'Caldera')}</span>
          <span class="${badgeClass(ep)}">${ep}</span>
          ${isAcept?`<span class="${badgeClass(et)}">${et}</span>`:''}
        </div>
      </div>
      ${r.descripcion?`<div class="card-desc">${r.descripcion.slice(0,120)}${r.descripcion.length>120?'…':''}</div>`:''}
      <div class="amounts">
        <div class="amt"><div class="amt-l">Base</div><div class="amt-v">${fmt(r.importe_base)}€</div></div>
        <div class="amt"><div class="amt-l">IVA 21%</div><div class="amt-v">${fmt(iva)}€</div></div>
        <div class="amt"><div class="amt-l">Total</div><div class="amt-v total">${fmt(r.importe_total)}€</div></div>
      </div>
      <div class="card-meta">
        ${r.tecnico?`<div class="meta">👤 <strong>${r.tecnico}</strong></div>`:''}
        ${r.fecha_trabajo?`<div class="meta">🔧 <strong>${fmtDate(r.fecha_trabajo)}</strong></div>`:''}
        ${r.forma_pago?`<div class="meta">💳 <strong>${r.forma_pago}</strong></div>`:''}
      </div>
      <div class="card-actions">
        ${stateBtn}
        <button class="btn-share" onclick="openShare(${id})">📤 Compartir</button>
        <button class="btn-edit-c" onclick="openEdit(${id})">✏ Editar</button>
        <button class="btn-del-c" onclick="delRecord(${id})">🗑</button>
      </div>
    </div>
  </div>`;
}

// ─── CALC IVA ─────────────────────────────────────────────────────────────────
function calcBase() {
  const b = parseFloat(document.getElementById('f-base').value)||0;
  if (b>0) document.getElementById('f-total').value = (b*1.21).toFixed(2);
}
function calcTotal() {
  const t = parseFloat(document.getElementById('f-total').value)||0;
  if (t>0) document.getElementById('f-base').value = (t/1.21).toFixed(2);
}

// ─── TIPO CHANGE ──────────────────────────────────────────────────────────────
function onTipoChange() {
  const tipo = document.getElementById('f-tipo').value;
  const desc = document.getElementById('f-desc');
  if (tipo==='Caldera' && !editingId) desc.value = DESC_CALDERA;
  else if (tipo==='Bomba' && !editingId) desc.value = DESC_BOMBA;
  else if (tipo==='Otro' && !editingId) desc.value = DESC_OTRO;
}

// ─── FORM ─────────────────────────────────────────────────────────────────────
function openNew() {
  editingId = null;
  document.getElementById('mTitle').textContent = '📋 Nuevo Presupuesto';
  clearForm();
  document.getElementById('f-num').value = nextNum();
  document.getElementById('f-fecha').value = today();
  document.getElementById('f-desc').value = DESC_CALDERA;
  openM('modalForm');
}

function openEdit(id) {
  editingId = id;
  const r = records.find(x=>x.id===id);
  if (!r) return;
  document.getElementById('mTitle').textContent = '✏ Editar Presupuesto';
  document.getElementById('f-num').value = r.numero_presupuesto||'';
  document.getElementById('f-fecha').value = r.fecha_presupuesto||today();
  document.getElementById('f-cliente').value = r.cliente||'';
  document.getElementById('f-tipo').value = r.tipo||'Caldera';
  document.getElementById('f-desc').value = r.descripcion||'';
  document.getElementById('f-base').value = r.importe_base||'';
  document.getElementById('f-total').value = r.importe_total||'';
  document.getElementById('f-fechatrab').value = r.fecha_trabajo||'';
  document.getElementById('f-tecnico').value = r.tecnico||'Jesús';
  document.getElementById('f-estpres').value = r.estado_presupuesto||'Pendiente';
  document.getElementById('f-esttrab').value = r.estado_trabajo||'Pendiente';
  document.getElementById('f-pago').value = r.forma_pago||'Transferencia';
  document.getElementById('f-notas').value = r.notas||'';
  openM('modalForm');
}

function clearForm() {
  ['f-num','f-cliente','f-desc','f-base','f-total','f-fecha','f-fechatrab','f-notas'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-tipo').value='Caldera';
  document.getElementById('f-tecnico').value='Jesús';
  document.getElementById('f-estpres').value='Pendiente';
  document.getElementById('f-esttrab').value='Pendiente';
  document.getElementById('f-pago').value='Transferencia';
}

async function saveRecord() {
  const cliente = document.getElementById('f-cliente').value.trim();
  if (!cliente) { showToast('Introduce el nombre del cliente', true); return; }
  const base = parseFloat(document.getElementById('f-base').value)||0;
  const total = parseFloat(document.getElementById('f-total').value)||0;
  const body = {
    numero_presupuesto: document.getElementById('f-num').value.trim(),
    fecha_presupuesto: document.getElementById('f-fecha').value||null,
    cliente,
    tipo: document.getElementById('f-tipo').value,
    descripcion: document.getElementById('f-desc').value.trim(),
    importe_base: base,
    importe_total: total,
    fecha_trabajo: document.getElementById('f-fechatrab').value||null,
    tecnico: document.getElementById('f-tecnico').value,
    estado_presupuesto: document.getElementById('f-estpres').value,
    estado_trabajo: document.getElementById('f-esttrab').value,
    forma_pago: document.getElementById('f-pago').value,
    notas: document.getElementById('f-notas').value.trim(),
  };
  try {
    let res;
    if (editingId) {
      res = await fetch(`${SUPA_URL}/rest/v1/${TABLE}?id=eq.${editingId}`, {method:'PATCH',headers:H,body:JSON.stringify(body)});
    } else {
      res = await fetch(`${SUPA_URL}/rest/v1/${TABLE}`, {method:'POST',headers:H,body:JSON.stringify(body)});
    }
    if (!res.ok) throw new Error(await res.text());
    closeM('modalForm');
    showToast(editingId ? 'Presupuesto actualizado ✓' : 'Presupuesto creado ✓');
    await loadRecords();
  } catch(e) {
    showToast('Error al guardar: '+e.message, true);
  }
}

// ─── CAMBIO ESTADO ────────────────────────────────────────────────────────────
async function chgPres(id, val) { await patch(id,{estado_presupuesto:val}); }
async function chgTrab(id, val) { await patch(id,{estado_trabajo:val}); }
async function patch(id, data) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${TABLE}?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify(data)});
    if (!r.ok) throw new Error();
    showToast('Estado actualizado ✓');
    await loadRecords();
  } catch { showToast('Error al actualizar', true); }
}

// ─── ELIMINAR ─────────────────────────────────────────────────────────────────
async function delRecord(id) {
  if (!confirm('¿Eliminar este presupuesto?')) return;
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${TABLE}?id=eq.${id}`,{method:'DELETE',headers:H});
    if (!r.ok) throw new Error();
    showToast('Eliminado');
    await loadRecords();
  } catch { showToast('Error al eliminar', true); }
}

// ─── COMPARTIR ────────────────────────────────────────────────────────────────
function openShare(id) {
  shareRecord = records.find(r=>r.id===id);
  if (!shareRecord) return;
  const r = shareRecord;
  const iva = (r.importe_total||0)-(r.importe_base||0);
  const texto = `*HAROSAT ECOTECHNICAL*
Presupuesto: ${r.numero_presupuesto||'—'}
Fecha: ${fmtDate(r.fecha_presupuesto)}
Cliente: ${r.cliente||'—'}
Tipo: ${r.tipo||'—'}

${r.descripcion||''}

Base imponible: ${fmt(r.importe_base)} €
IVA (21%): ${fmt(iva)} €
*TOTAL: ${fmt(r.importe_total)} €*

Forma de pago: ${r.forma_pago||'—'}
Técnico: ${r.tecnico||'—'}

HAROSAT Ecotechnical – Haro, La Rioja`;

  document.getElementById('shareNum').textContent = r.numero_presupuesto||'—';
  document.getElementById('shareCli').textContent = r.cliente||'—';

  const waUrl = 'https://wa.me/?text='+encodeURIComponent(texto);
  const gmailUrl = `mailto:?subject=${encodeURIComponent('Presupuesto '+r.numero_presupuesto+' - HAROSAT')}&body=${encodeURIComponent(texto)}`;

  document.getElementById('btnWA').href = waUrl;
  document.getElementById('btnGmail').href = gmailUrl;
  document.getElementById('btnCopy')._text = texto;
  openM('modalShare');
}

function copyText() {
  const btn = document.getElementById('btnCopy');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(btn._text).then(()=>showToast('Copiado al portapapeles ✓'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = btn._text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copiado al portapapeles ✓');
  }
  closeM('modalShare');
}

// ─── EXPORT CSV ───────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = ['numero_presupuesto','fecha_presupuesto','cliente','tipo','descripcion','importe_base','importe_total','fecha_trabajo','tecnico','estado_presupuesto','estado_trabajo','forma_pago','notas'];
  const hdr = cols.join(';');
  const rows = filtered().map(r=>cols.map(c=>`"${(r[c]||'').toString().replace(/"/g,'""')}"`).join(';'));
  const csv = [hdr,...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = `harosat_presupuestos_${YEAR}.csv`;
  a.click();
}

// ─── UTILIDADES ───────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }
function fmt(n) { return Number(n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) { if(!d) return '—'; const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }
function openM(id) { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast'+(err?' err':'')+' show';
  setTimeout(()=>t.className='toast',3000);
}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
