<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
--wolf-red: #DC142D;
--wolf-dark: #1a1a1a;
--wolf-gray: #2a2a2a;
--wolf-light: #f5f5f5;
--wolf-border: #3a3a3a;
}

- {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  }

body {
font-family: ‘Roboto Condensed’, sans-serif;
background: var(–wolf-dark);
color: var(–wolf-light);
min-height: 100vh;
}

.header {
background: linear-gradient(135deg, var(–wolf-red) 0%, #a00f22 100%);
padding: 20px;
text-align: center;
box-shadow: 0 4px 20px rgba(220, 20, 45, 0.4);
position: relative;
overflow: hidden;
}

.header::before {
content: ‘’;
position: absolute;
top: -50%;
right: -50%;
width: 200%;
height: 200%;
background: repeating-linear-gradient(
45deg,
transparent,
transparent 10px,
rgba(255,255,255,0.03) 10px,
rgba(255,255,255,0.03) 20px
);
animation: slide 20s linear infinite;
}

@keyframes slide {
0% { transform: translate(0, 0); }
100% { transform: translate(50px, 50px); }
}

.wolf-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 72px;
letter-spacing: 8px;
color: white;
text-shadow: 0 4px 10px rgba(0,0,0,0.5);
position: relative;
z-index: 1;
margin: 0;
line-height: 1;
}

.subtitle {
font-size: 14px;
text-transform: uppercase;
letter-spacing: 3px;
color: rgba(255,255,255,0.9);
margin-top: 8px;
position: relative;
z-index: 1;
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 30px 20px;
}

.stats-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 20px;
margin-bottom: 30px;
}

.stat-card {
background: var(–wolf-gray);
border: 2px solid var(–wolf-border);
border-radius: 12px;
padding: 20px;
text-align: center;
transition: all 0.3s;
position: relative;
overflow: hidden;
}

.stat-card::before {
content: ‘’;
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 3px;
background: var(–wolf-red);
transform: scaleX(0);
transition: transform 0.3s;
}

.stat-card:hover {
border-color: var(–wolf-red);
transform: translateY(-2px);
}

.stat-card:hover::before {
transform: scaleX(1);
}

.stat-value {
font-size: 36px;
font-weight: 700;
color: var(–wolf-red);
margin-bottom: 5px;
}

.stat-label {
font-size: 12px;
text-transform: uppercase;
letter-spacing: 1px;
color: #999;
}

.controls {
display: flex;
gap: 15px;
margin-bottom: 25px;
flex-wrap: wrap;
align-items: center;
}

.btn {
padding: 12px 24px;
border: none;
border-radius: 6px;
font-family: ‘Roboto Condensed’, sans-serif;
font-size: 14px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.2s;
display: inline-flex;
align-items: center;
gap: 8px;
}

.btn-primary {
background: var(–wolf-red);
color: white;
box-shadow: 0 4px 15px rgba(220, 20, 45, 0.3);
}

.btn-primary:hover {
background: #a00f22;
transform: translateY(-1px);
box-shadow: 0 6px 20px rgba(220, 20, 45, 0.4);
}

.btn-secondary {
background: var(–wolf-gray);
color: var(–wolf-light);
border: 1px solid var(–wolf-border);
}

.btn-secondary:hover {
background: var(–wolf-border);
}

.search-box {
flex: 1;
min-width: 250px;
padding: 12px 16px;
background: var(–wolf-gray);
border: 1px solid var(–wolf-border);
border-radius: 6px;
color: var(–wolf-light);
font-family: ‘Roboto Condensed’, sans-serif;
font-size: 14px;
}

.search-box:focus {
outline: none;
border-color: var(–wolf-red);
}

.table-container {
background: var(–wolf-gray);
border: 1px solid var(–wolf-border);
border-radius: 12px;
overflow: hidden;
}

table {
width: 100%;
border-collapse: collapse;
}

thead {
background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
}

th {
padding: 16px;
text-align: left;
font-size: 11px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: var(–wolf-red);
font-weight: 700;
border-bottom: 2px solid var(–wolf-red);
}

td {
padding: 16px;
border-bottom: 1px solid var(–wolf-border);
font-size: 13px;
}

tr:hover td {
background: rgba(220, 20, 45, 0.05);
}

tr:last-child td {
border-bottom: none;
}

.badge {
display: inline-block;
padding: 4px 10px;
border-radius: 4px;
font-size: 11px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.5px;
}

.badge-success {
background: rgba(46, 213, 115, 0.2);
color: #2ed573;
border: 1px solid rgba(46, 213, 115, 0.3);
}

.badge-pending {
background: rgba(255, 184, 0, 0.2);
color: #ffb800;
border: 1px solid rgba(255, 184, 0, 0.3);
}

.action-btns {
display: flex;
gap: 8px;
}

.icon-btn {
background: none;
border: none;
color: #999;
cursor: pointer;
padding: 6px;
border-radius: 4px;
transition: all 0.2s;
}

.icon-btn:hover {
color: var(–wolf-red);
background: rgba(220, 20, 45, 0.1);
}

.modal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.85);
z-index: 1000;
align-items: center;
justify-content: center;
padding: 20px;
}

.modal.active {
display: flex;
}

.modal-content {
background: var(–wolf-gray);
border: 2px solid var(–wolf-red);
border-radius: 12px;
max-width: 600px;
width: 100%;
max-height: 90vh;
overflow-y: auto;
box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.modal-header {
background: linear-gradient(135deg, var(–wolf-red) 0%, #a00f22 100%);
padding: 20px 25px;
border-bottom: 2px solid var(–wolf-border);
}

.modal-title {
font-size: 20px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 2px;
color: white;
}

.modal-body {
padding: 25px;
}

.form-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

.form-field {
display: flex;
flex-direction: column;
gap: 8px;
}

.form-field.full {
grid-column: 1 / -1;
}

.form-label {
font-size: 12px;
text-transform: uppercase;
letter-spacing: 1px;
color: #999;
font-weight: 700;
}

.form-input {
padding: 12px;
background: var(–wolf-dark);
border: 1px solid var(–wolf-border);
border-radius: 6px;
color: var(–wolf-light);
font-family: ‘Roboto Condensed’, sans-serif;
font-size: 14px;
transition: border-color 0.2s;
}

.form-input:focus {
outline: none;
border-color: var(–wolf-red);
}

.modal-footer {
padding: 20px 25px;
border-top: 1px solid var(–wolf-border);
display: flex;
gap: 12px;
justify-content: flex-end;
}

.empty-state {
text-align: center;
padding: 60px 20px;
color: #666;
}

.empty-icon {
font-size: 64px;
margin-bottom: 16px;
opacity: 0.3;
}

@media (max-width: 768px) {
.wolf-logo {
font-size: 48px;
letter-spacing: 4px;
}
.form-grid {
grid-template-columns: 1fr;
}
.stats-grid {
grid-template-columns: 1fr 1fr;
}
.controls {
flex-direction: column;
align-items: stretch;
}
.search-box {
min-width: 100%;
}
}
</style>

</head>
<body>

<header class="header">
<h1 class="wolf-logo">WOLF</h1>
<p class="subtitle">Control de Puestas en Marcha</p>
</header>

<div class="container">
<div class="stats-grid">
<div class="stat-card">
<div class="stat-value" id="quarter-count">0</div>
<div class="stat-label">Este Trimestre</div>
</div>
<div class="stat-card">
<div class="stat-value" id="registered-count">0</div>
<div class="stat-label">Registradas en Wolf</div>
</div>
<div class="stat-card">
<div class="stat-value" id="pending-count">0</div>
<div class="stat-label">Pendientes Wolf</div>
</div>
<div class="stat-card">
<div class="stat-value" id="total-count">0</div>
<div class="stat-label">Total Histórico</div>
</div>
</div>

<div class="controls">
<button class="btn btn-primary" onclick="openModal()">+ Nueva Puesta en Marcha</button>
<button class="btn btn-secondary" onclick="exportCSV()">⬇ Exportar Excel</button>
<input type="text" class="search-box" id="search" placeholder="Buscar por nº serie, modelo, población..." oninput="filterTable()">
</div>

<div class="table-container">
<table id="commissioning-table">
<thead>
<tr>
<th>Fecha</th>
<th>Nº Serie</th>
<th>Modelo</th>
<th>Población</th>
<th>Dirección</th>
<th>Estado Wolf</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="table-body">
<tr><td colspan="7" class="empty-state"><div class="empty-icon">🔧</div><p>Sin puestas en marcha registradas</p></td></tr>
</tbody>
</table>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<div class="modal-header">
<h2 class="modal-title" id="modal-title">Nueva Puesta en Marcha</h2>
</div>
<div class="modal-body">
<div class="form-grid">
<div class="form-field">
<label class="form-label">Fecha Puesta en Marcha *</label>
<input type="date" class="form-input" id="f-fecha">
</div>
<div class="form-field">
<label class="form-label">Nº Serie *</label>
<input type="text" class="form-input" id="f-serie" placeholder="Ej: W12345678">
</div>
<div class="form-field full">
<label class="form-label">Modelo Wolf *</label>
<input type="text" class="form-input" id="f-modelo" placeholder="Ej: FGB-K 24">
</div>
<div class="form-field full">
<label class="form-label">Dirección *</label>
<input type="text" class="form-input" id="f-direccion" placeholder="Calle, número, piso">
</div>
<div class="form-field">
<label class="form-label">Población *</label>
<input type="text" class="form-input" id="f-poblacion" placeholder="Ej: Haro">
</div>
<div class="form-field">
<label class="form-label">Código Postal</label>
<input type="text" class="form-input" id="f-cp" placeholder="26200">
</div>
<div class="form-field full">
<label class="form-label">Estado Registro Wolf</label>
<select class="form-input" id="f-estado">
<option value="pendiente">Pendiente de registrar</option>
<option value="registrada">Registrada en Wolf</option>
</select>
</div>
<div class="form-field full">
<label class="form-label">Notas</label>
<input type="text" class="form-input" id="f-notas" placeholder="Cliente, observaciones...">
</div>
</div>
</div>
<div class="modal-footer">
<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
<button class="btn btn-primary" onclick="saveCommissioning()">Guardar</button>
</div>
</div>
</div>

<script>
// Supabase
const SUPA_URL = 'https://sobiyfyzalynxcpfoldc.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvYml5Znl6YWx5bnhjcGZvbGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTA0MjksImV4cCI6MjA4ODU4NjQyOX0.FJOYHGjk-UI-SfEpZ2ytOvUJuTb4kGL9aBqj2ChXgek';
const H = {'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json'};

let data = [];
let editingId = null;

async function loadData() {
try {
const r = await fetch(`${SUPA_URL}/rest/v1/wolf_commissioning?select=*&order=fecha.desc`, {headers:H});
if(!r.ok) throw new Error('Error cargando');
data = await r.json();
renderTable();
updateStats();
} catch(e) {
console.error(e);
}
}

function renderTable(filtered = data) {
const tbody = document.getElementById('table-body');
if(!filtered.length) {
tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><div class="empty-icon">🔍</div><p>Sin resultados</p></td></tr>';
return;
}
tbody.innerHTML = filtered.map(item => `
<tr>
<td>${item.fecha}</td>
<td><strong>${item.numero_serie}</strong></td>
<td>${item.modelo}</td>
<td>${item.poblacion}</td>
<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.direccion}</td>
<td><span class="badge ${item.estado_wolf === 'registrada' ? 'badge-success' : 'badge-pending'}">${item.estado_wolf === 'registrada' ? '✓ Registrada' : '⏳ Pendiente'}</span></td>
<td>
<div class="action-btns">
<button class="icon-btn" onclick="editItem(${item.id})" title="Editar">✏️</button>
<button class="icon-btn" onclick="deleteItem(${item.id})" title="Eliminar">🗑️</button>
</div>
</td>
</tr>
`).join('');
}

function updateStats() {
const now = new Date();
const currentQuarter = Math.floor(now.getMonth() / 3);
const quarterStart = new Date(now.getFullYear(), currentQuarter * 3, 1);
const quarterEnd = new Date(now.getFullYear(), (currentQuarter + 1) * 3, 0);
  
const thisQuarter = data.filter(x => {
const d = new Date(x.fecha);
return d >= quarterStart && d <= quarterEnd;
});

document.getElementById('quarter-count').textContent = thisQuarter.length;
document.getElementById('total-count').textContent = data.length;
document.getElementById('pending-count').textContent = data.filter(x => x.estado_wolf === 'pendiente').length;
document.getElementById('registered-count').textContent = data.filter(x => x.estado_wolf === 'registrada').length;
}

function filterTable() {
const q = document.getElementById('search').value.toLowerCase();
const filtered = data.filter(x =>
x.numero_serie.toLowerCase().includes(q) ||
x.modelo.toLowerCase().includes(q) ||
x.poblacion.toLowerCase().includes(q) ||
x.direccion.toLowerCase().includes(q)
);
renderTable(filtered);
}

function openModal(id = null) {
editingId = id;
const modal = document.getElementById('modal');
if(id) {
const item = data.find(x => x.id === id);
if(!item) return;
document.getElementById('modal-title').textContent = 'Editar Puesta en Marcha';
document.getElementById('f-fecha').value = item.fecha;
document.getElementById('f-serie').value = item.numero_serie;
document.getElementById('f-modelo').value = item.modelo;
document.getElementById('f-direccion').value = item.direccion;
document.getElementById('f-poblacion').value = item.poblacion;
document.getElementById('f-cp').value = item.codigo_postal || '';
document.getElementById('f-estado').value = item.estado_wolf;
document.getElementById('f-notas').value = item.notas || '';
} else {
document.getElementById('modal-title').textContent = 'Nueva Puesta en Marcha';
document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
document.getElementById('f-serie').value = '';
document.getElementById('f-modelo').value = '';
document.getElementById('f-direccion').value = '';
document.getElementById('f-poblacion').value = '';
document.getElementById('f-cp').value = '';
document.getElementById('f-estado').value = 'pendiente';
document.getElementById('f-notas').value = '';
}
modal.classList.add('active');
}

function closeModal() {
document.getElementById('modal').classList.remove('active');
}

async function saveCommissioning() {
const fecha = document.getElementById('f-fecha').value;
const serie = document.getElementById('f-serie').value.trim();
const modelo = document.getElementById('f-modelo').value.trim();
const direccion = document.getElementById('f-direccion').value.trim();
const poblacion = document.getElementById('f-poblacion').value.trim();

if(!fecha || !serie || !modelo || !direccion || !poblacion) {
alert('Completa los campos obligatorios');
return;
}

const payload = {
fecha,
numero_serie: serie,
modelo,
direccion,
poblacion,
codigo_postal: document.getElementById('f-cp').value.trim(),
estado_wolf: document.getElementById('f-estado').value,
notas: document.getElementById('f-notas').value.trim()
};

try {
if(editingId) {
const r = await fetch(`${SUPA_URL}/rest/v1/wolf_commissioning?id=eq.${editingId}`, {
method:'PATCH',
headers:{...H,'Prefer':'return=representation'},
body:JSON.stringify(payload)
});
if(!r.ok) throw new Error('Error actualizando');
} else {
const r = await fetch(`${SUPA_URL}/rest/v1/wolf_commissioning`, {
method:'POST',
headers:{...H,'Prefer':'return=representation'},
body:JSON.stringify(payload)
});
if(!r.ok) throw new Error('Error guardando');
}
closeModal();
loadData();
} catch(e) {
alert('Error: ' + e.message);
}
}

function editItem(id) {
openModal(id);
}

async function deleteItem(id) {
if(!confirm('¿Eliminar esta puesta en marcha?')) return;
try {
const r = await fetch(`${SUPA_URL}/rest/v1/wolf_commissioning?id=eq.${id}`, {method:'DELETE',headers:H});
if(!r.ok) throw new Error('Error eliminando');
loadData();
} catch(e) {
alert('Error: ' + e.message);
}
}

function exportCSV() {
let csv = 'Fecha;Nº Serie;Modelo;Dirección;Población;CP;Estado Wolf;Notas\n';
data.forEach(x => {
csv += `${x.fecha};${x.numero_serie};${x.modelo};"${x.direccion}";${x.poblacion};${x.codigo_postal||''};${x.estado_wolf};${x.notas||''}\n`;
});
const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
const a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = `Wolf_Puestas_en_Marcha_${new Date().toISOString().split('T')[0]}.csv`;
a.click();
}

// Init
loadData();

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
if(e.target.id === 'modal') closeModal();
});
</script>

</body>
</html>
